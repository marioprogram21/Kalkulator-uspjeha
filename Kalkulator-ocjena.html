<!DOCTYPE html>
<html lang="hr">
<head>
<meta charset="UTF-8">
<title>Kalkulator ocjena</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#667eea">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon.png">

<style>
:root {
    --bg-color: linear-gradient(135deg, #667eea, #764ba2); /* tamno-plava */
    --text-color: white;
    --box-color: rgba(255,255,255,0.15); /* glass efekt */
    --btn-color: #6c5ce7;
    --delete-color: red;

    --bg-light: linear-gradient(135deg, #f0e6ff, #e0d4ff);
    --text-light: black;
    --box-light: rgba(255,255,255,0.85);
    --btn-light: #6c5ce7;
}

body {
    background: var(--bg-color);
    color: var(--text-color);
    font-family: 'Segoe UI', sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
    margin: 0;
    padding: 0; /* uklonjena vertikalna rupa */
    transition: all 0.3s ease;
}

body.light { 
    background: var(--bg-light);
    color: var(--text-light);
}

h1 { 
    margin: 0;
    padding: 20px 0 10px 0;
    text-align: center; 
}

.box {
    background: var(--box-color);
    padding: 25px;
    border-radius: 20px;
    width: 360px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.25);
    display: flex;
    flex-direction: column;
    align-items: center;
    transition: all 0.3s ease;
}
body.light .box { background: var(--box-light); }

.ocjena-card {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin: 6px 0;
    padding: 10px 12px;
    width: 100%;
    border-radius: 12px;
    background: var(--box-color);
    font-weight: bold;
}
body.light .ocjena-card { background: var(--box-light); }

.ocjena-card input {
    width: 60px;
    padding: 8px;
    border-radius: 6px;
    border: none;
    text-align: center;
}

/* Smanjene tipke za brisanje */
.delete {
    background: var(--delete-color);
    color: white;
    border: none;
    padding: 2px 4px;
    border-radius: 6px;
    cursor: pointer;
    font-weight: bold;
    font-size: 0.75em;
}

.btn-group {
    display: flex;
    justify-content: space-between;
    gap: 10px;
    flex-wrap: wrap;
    margin-top: 10px;
    width: 100%;
}

/* Smanjeni gumb "🗑 Obriši sve" */
.btn-group button:nth-child(3) {
    padding: 8px 12px;
    font-size: 0.9em;
}

button {
    padding: 10px 15px;
    border: none;
    border-radius: 12px;
    font-size: 1em;
    font-weight: bold;
    background: var(--btn-color);
    color: white;
    cursor: pointer;
    transition: 0.2s;
}
body.light button { background: var(--btn-light); }

button:hover { opacity: 0.85; }

.avg { text-align: center; margin-top: 15px; }
.avg-number { font-size: 48px; font-weight: bold; letter-spacing: 1px; }
.small { opacity: 0.8; font-size: 0.9em; }

footer { margin-top: 15px; opacity: 0.7; text-align:center; }
</style>
</head>

<body>
<h1>Kalkulator ocjena</h1>

<div class="box">
    <div id="ocjene"></div>

    <div class="btn-group">
        <button onclick="dodaj()">+ Dodaj</button>
        <button onclick="izracunaj()">Izračunaj</button>
        <button onclick="obrisiSve()">🗑 Obriši sve</button>
        <button onclick="promijeniTemu()">💡 Tema</button>
        <button onclick="window.location.href='index.html'">🏠 Menu</button>
        <button id="installBtn" style="display:none;">📲 Instaliraj app</button>
    </div>

    <div class="avg">
        <div class="avg-number" id="avg">0.00</div>
        <div class="small">Prosjek</div>
    </div>
</div>

<footer>Napravio Mario</footer>

<script>
// Tema
function promijeniTemu(){
    document.body.classList.toggle('light');
    localStorage.setItem('tema', document.body.classList.contains('light') ? 'light' : 'dark');
}
if(localStorage.getItem('tema')==='light') document.body.classList.add('light');

// Dodavanje ocjena
let grades = JSON.parse(localStorage.getItem("grades")) || [];

function save() { localStorage.setItem("grades", JSON.stringify(grades)); }

function dodaj(v="") {
    const div = document.getElementById("ocjene");
    const wrap = document.createElement("div");
    wrap.className = "ocjena-card";

    const input = document.createElement("input");
    input.type = "number";
    input.placeholder = "1-5";
    input.value = v;
    input.oninput = spremi;

    const btn = document.createElement("button");
    btn.innerText = "X";
    btn.className = "delete";
    btn.onclick = () => { wrap.remove(); spremi(); };

    wrap.appendChild(input);
    wrap.appendChild(btn);
    div.appendChild(wrap);
    spremi();
}

function izracunaj(){
    const inputs = document.querySelectorAll("#ocjene input");
    let suma=0, count=0;

    inputs.forEach(i=>{
        let v=Number(i.value);
        if(v>=1 && v<=5){
            suma+=v;
            count++;
        }
    });

    const rezultat = document.getElementById("avg");
    const poruka = document.querySelector(".small");

    if(count===0){
        rezultat.textContent="0.00";
        poruka.textContent="";
        return;
    }

    let p=suma/count;
    rezultat.textContent = p.toFixed(2);
    poruka.textContent =
      p>=4.5 ? "🔥 Odličan!" :
      p>=3.5 ? "👍 Vrlo dobar" :
      p>=2.5 ? "🙂 Dobar" :
      "😬 Moraš učiti";
}

// Obriši sve
function obrisiSve(){
    document.getElementById("ocjene").innerHTML = "";
    grades = [];
    save();
    izracunaj();
}

// Storage
function spremi(){
    const arr=[];
    document.querySelectorAll("#ocjene input").forEach(i=>arr.push(i.value));
    localStorage.setItem("grades", JSON.stringify(arr));
}

function ucitaj(){
    const data = JSON.parse(localStorage.getItem("grades"));
    if(data && data.length>0){
        data.forEach(v=>dodaj(v));
    } else dodaj();
}
ucitaj();

// PWA Instalacija
let deferredPrompt;
window.addEventListener('beforeinstallprompt', (e) => {
    e.preventDefault();
    deferredPrompt = e;
    const btn = document.getElementById('installBtn');
    btn.style.display = 'block';
    btn.addEventListener('click', () => {
        btn.style.display = 'none';
        deferredPrompt.prompt();
        deferredPrompt.userChoice.then(() => { deferredPrompt = null; });
    });
});
</script>

</body>
</html>
