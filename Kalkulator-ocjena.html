<!DOCTYPE html>
<html lang="hr">
<head>
<meta charset="UTF-8">
<title>Kalkulator ocjena</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
:root{
    --bg: linear-gradient(135deg, #0f172a, #0b2a4a, #1b4d6b);
    --card: rgba(255,255,255,0.08);
    --card-border: rgba(255,255,255,0.12);

    --text: #e5f2ff;
    --muted: rgba(229,242,255,0.7);

    --accent: #38bdf8;
    --accent2: #a78bfa;
    --danger: #fb7185;
}

*{
    box-sizing:border-box;
    font-family: system-ui, Segoe UI, sans-serif;
}

body{
    margin:0;
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    padding:30px 15px;
    background:var(--bg);
    color:var(--text);
}

h1{
    margin:10px 0 25px;
    font-size:2.2rem;
    text-align:center;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

.box{
    width:420px;
    max-width:95%;
    padding:20px;
    border-radius:22px;
    background:var(--card);
    border:1px solid var(--card-border);
    backdrop-filter: blur(16px);
    box-shadow: 0 20px 40px rgba(0,0,0,0.35);
}

.ocjena{
    display:flex;
    gap:10px;
    margin:10px 0;
}

input{
    flex:1;
    padding:12px;
    border-radius:14px;
    border:1px solid rgba(255,255,255,0.15);
    background:rgba(255,255,255,0.06);
    color:var(--text);
    text-align:center;
    font-size:1rem;
    outline:none;
    transition:0.2s;
}

input:focus{
    border-color:var(--accent);
    transform:scale(1.02);
}

button{
    padding:12px 14px;
    border:none;
    border-radius:14px;
    cursor:pointer;
    font-weight:600;
    transition:0.2s;
}

.btn{
    background:linear-gradient(135deg, var(--accent), var(--accent2));
    color:white;
}

.btn:hover{
    transform:scale(1.05);
}

.del{
    background:rgba(255,255,255,0.1);
    color:var(--danger);
}

.del:hover{
    background:var(--danger);
    color:white;
}

.actions{
    display:flex;
    flex-wrap:wrap;
    gap:10px;
    margin-top:15px;
}

.result{
    text-align:center;
    margin-top:20px;
}

.big{
    font-size:3rem;
    font-weight:800;
    background:linear-gradient(90deg,var(--accent),var(--accent2));
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

.small{
    color:var(--muted);
}

@keyframes pop{
    0%{transform:scale(0.8);}
    60%{transform:scale(1.2);}
    100%{transform:scale(1);}
}
</style>
</head>

<body>

<h1>✨ Kalkulator ocjena</h1>

<div class="box">

    <div id="wrap"></div>

    <div class="actions">
        <button class="btn" onclick="add()">+ Dodaj</button>
        <button class="btn" onclick="calc()">Izračunaj</button>
        <button class="del" onclick="clearAll()">Obriši sve</button>
    </div>

    <div class="result">
        <div id="avg" class="big">0.00</div>
        <div id="msg" class="small"></div>
    </div>

</div>

<script>

function add(val=""){
    const div = document.createElement("div");
    div.className = "ocjena";

    const input = document.createElement("input");
    input.type = "number";
    input.min = 1;
    input.max = 5;
    input.value = val;

    input.oninput = calc;

    const del = document.createElement("button");
    del.className = "del";
    del.textContent = "X";
    del.onclick = () => {
        div.remove();
        calc();
    };

    div.appendChild(input);
    div.appendChild(del);

    document.getElementById("wrap").appendChild(div);

    calc();
}

function calc(){
    let inputs = document.querySelectorAll("input");
    let sum = 0, count = 0;

    inputs.forEach(i=>{
        let v = Number(i.value);
        if(v>=1 && v<=5){
            sum += v;
            count++;
        }
    });

    let avg = document.getElementById("avg");
    let msg = document.getElementById("msg");

    if(count===0){
        avg.textContent="0.00";
        msg.textContent="";
        return;
    }

    let p = sum / count;

    avg.textContent = p.toFixed(2);

    avg.style.animation="pop 0.5s";
    setTimeout(()=>avg.style.animation="",500);

    msg.textContent =
        p>=4.5 ? "🔥 Top rezultat" :
        p>=3.5 ? "👍 Dobro" :
        p>=2.5 ? "🙂 Solidno" :
        "📚 Treba učiti";
}

function clearAll(){
    document.getElementById("wrap").innerHTML="";
    calc();
}

add();

</script>

</body>
</html>
