<!DOCTYPE html>
<html lang="hr">
<head>
<meta charset="UTF-8">
<title>Kalkulator ocjena</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
:root {
    --bg-color: linear-gradient(135deg, #667eea, #764ba2);
    --text-color: white;
    --box-color: rgba(255,255,255,0.15);
    --btn-color: #6c5ce7;
}

body {
    background: var(--bg-color);
    color: var(--text-color);
    font-family: sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    margin: 0;
    padding: 20px;
}

.box {
    background: var(--box-color);
    padding: 25px;
    border-radius: 20px;
    width: 380px;
}

.ocjena-card {
    display: flex;
    gap: 10px;
    margin: 8px 0;
    padding: 12px;
    border-radius: 14px;
    background: rgba(255,255,255,0.2);

    transform: scale(0.9);
}

.ocjena-card.animate {
    animation: cardIn 0.4s ease forwards;
}

@keyframes cardIn {
    0% { transform: scale(0.8) translateY(-10px); }
    60% { transform: scale(1.08) translateY(3px); }
    100% { transform: scale(1); }
}

input {
    width: 80px;
    padding: 10px;
    border-radius: 8px;
    border: none;
    text-align: center;
}

button {
    padding: 10px;
    border-radius: 8px;
    border: none;
    background: #6c5ce7;
    color: white;
    cursor: pointer;
}

.avg {
    text-align: center;
    margin-top: 15px;
}

.avg-number {
    font-size: 48px;
}

/* prosjek animacija */
@keyframes avgPop {
    0% { transform: scale(0.7); }
    60% { transform: scale(1.2); }
    100% { transform: scale(1); }
}
</style>
</head>

<body>

<h2>Kalkulator ocjena</h2>

<div class="box">
    <div id="ocjene"></div>

    <button onclick="dodaj()">+ Dodaj</button>
    <button onclick="izracunaj()">Izračunaj</button>
    <button onclick="obrisiSve()">Obriši sve</button>

    <div class="avg">
        <div id="avg" class="avg-number">0.00</div>
        <div id="msg"></div>
    </div>
</div>

<script>
function dodaj() {
    const div = document.getElementById("ocjene");

    const wrap = document.createElement("div");
    wrap.className = "ocjena-card";

    const input = document.createElement("input");
    input.type = "number";
    input.placeholder = "1-5";

    const btn = document.createElement("button");
    btn.innerText = "X";
    btn.onclick = () => wrap.remove();

    wrap.appendChild(input);
    wrap.appendChild(btn);
    div.appendChild(wrap);

    requestAnimationFrame(() => {
        wrap.classList.add("animate");
    });
}

function izracunaj(){
    const inputs = document.querySelectorAll("#ocjene input"); // 🔥 FIX
    let suma=0, count=0;

    inputs.forEach(i=>{
        let v=Number(i.value);
        if(v>=1 && v<=5){ suma+=v; count++; }
    });

    const avg = document.getElementById("avg");
    const msg = document.getElementById("msg");

    if(count===0){
        avg.textContent="0.00";
        msg.textContent="";
        return;
    }

    let p=suma/count;
    avg.textContent=p.toFixed(2);

    avg.style.animation="none";
    avg.offsetHeight;
    avg.style.animation="avgPop 0.4s";

    msg.textContent =
      p>=4.5 ? "🔥 Odličan!" :
      p>=3.5 ? "👍 Vrlo dobar" :
      p>=2.5 ? "🙂 Dobar" :
      "😬 Moraš učiti";
}

function obrisiSve(){
    document.getElementById("ocjene").innerHTML="";
    izracunaj();
}

// start
dodaj();
</script>

</body>
</html>
