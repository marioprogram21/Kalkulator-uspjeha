<!DOCTYPE html>
<html lang="hr">
<head>
<meta charset="UTF-8">
<title>Kalkulator ocjena</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    min-height: 100vh;
    font-family: 'Segoe UI', sans-serif;
}

/* 🌙 DARK (DEFAULT) */
body {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px 0 40px;

    background: #1a237e;
    color: white;

    transition: 0.3s ease;
}

/* ☀️ LIGHT MODE */
body[data-theme="light"] {
    background: #f0e6ff;
    color: #111;
}

/* BOX */
.box {
    width: 440px;
    max-width: 92%;
    padding: 25px;

    border-radius: 20px;

    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(10px);

    border: 1px solid rgba(255,255,255,0.12);

    box-shadow: 0 15px 35px rgba(0,0,0,0.35);

    display: flex;
    flex-direction: column;
    align-items: center;

    transition: 0.3s ease;
}

/* LIGHT BOX */
body[data-theme="light"] .box {
    background: rgba(255,255,255,0.4);
}

/* OCJENE */
.ocjena-card {
    display: flex;
    gap: 10px;
    margin: 8px 0;
    width: 100%;
    justify-content: center;
}

/* INPUT */
input {
    width: 100px;
    padding: 10px;
    border-radius: 10px;
    border: none;
    text-align: center;
    font-size: 1.1em;

    background: rgba(255,255,255,0.06);
    color: white;
}

/* LIGHT INPUT */
body[data-theme="light"] input {
    color: #111;
    background: rgba(0,0,0,0.05);
}

/* BUTTON */
button {
    padding: 12px 18px;
    border: none;
    border-radius: 12px;
    font-weight: bold;
    cursor: pointer;

    background: #6c5ce7;
    color: white;

    transition: 0.25s;
}

button:hover {
    background: #5a4fcf;
    transform: scale(1.05);
}

/* DELETE */
.delete {
    background: #fb7185;
    padding: 6px 12px;
}

/* MENU */
.menu-btn {
    background: linear-gradient(135deg, #22c55e, #4ade80);
}

/* BUTTON GROUP */
.btn-group {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 10px;
    margin-top: 10px;
    width: 100%;
}

/* RESULT */
.avg {
    text-align: center;
    margin-top: 15px;
}

.avg-number {
    font-size: 48px;
    font-weight: bold;
}

.small {
    opacity: 0.85;
    font-size: 0.9em;
}

/* ANIMATION */
@keyframes pop {
    0% { transform: scale(0.8); }
    60% { transform: scale(1.2); }
    100% { transform: scale(1); }
}

</style>
</head>

<body>

<h1>Kalkulator ocjena</h1>

<div class="box">

    <div id="ocjene"></div>

    <div class="btn-group">
        <button onclick="dodaj()">+ Dodaj</button>
        <button onclick="izracunaj()">Izračunaj</button>
        <button onclick="obrisiSve()">🗑 Obriši sve</button>
        <button onclick="promijeniTemu()">💡 Tema</button>
        <button class="menu-btn" onclick="window.location.href='index.html'">🏠 Menu</button>
    </div>

    <div class="avg">
        <div class="avg-number" id="avg">0.00</div>
        <div class="small" id="msg"></div>
    </div>

</div>

<script>

/* LOAD THEME */
const savedTheme = localStorage.getItem("tema");
if(savedTheme){
    document.body.setAttribute("data-theme", savedTheme);
}

/* TOGGLE THEME */
function promijeniTemu(){
    const current = document.body.getAttribute("data-theme");

    if(current === "light"){
        document.body.setAttribute("data-theme", "dark");
        localStorage.setItem("tema", "dark");
    } else {
        document.body.setAttribute("data-theme", "light");
        localStorage.setItem("tema", "light");
    }
}

/* ADD */
function dodaj(v=""){
    const wrap = document.createElement("div");
    wrap.className = "ocjena-card";

    const input = document.createElement("input");
    input.type = "number";
    input.min = 1;
    input.max = 5;
    input.value = v;

    input.oninput = izracunaj;

    const btn = document.createElement("button");
    btn.textContent = "X";
    btn.className = "delete";

    btn.onclick = () => {
        wrap.remove();
        izracunaj();
    };

    wrap.appendChild(input);
    wrap.appendChild(btn);

    document.getElementById("ocjene").appendChild(wrap);

    izracunaj();
}

/* CALC */
function izracunaj(){
    const inputs = document.querySelectorAll("input");

    let sum = 0, count = 0;

    inputs.forEach(i=>{
        let v = Number(i.value);
        if(v>=1 && v<=5){
            sum += v;
            count++;
        }
    });

    const avg = document.getElementById("avg");
    const msg = document.getElementById("msg");

    if(count===0){
        avg.textContent="0.00";
        msg.textContent="";
        return;
    }

    let p = sum / count;

    avg.textContent = p.toFixed(2);

    avg.style.animation = "pop 0.5s";
    setTimeout(()=> avg.style.animation="", 500);

    msg.textContent =
        p>=4.5 ? "🔥 Odličan" :
        p>=3.5 ? "👍 Vrlo dobar" :
        p>=2.5 ? "🙂 Dobar" :
        "😬 Treba učiti";
}

/* CLEAR */
function obrisiSve(){
    document.getElementById("ocjene").innerHTML = "";
    izracunaj();
}

dodaj();

</script>

</body>
</html>
