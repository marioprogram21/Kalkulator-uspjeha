<!DOCTYPE html>
<html lang="hr">
<head>
<meta charset="UTF-8">
<title>Kalkulator ocjena</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
:root {
    --bg-color: linear-gradient(135deg, #667eea, #764ba2);
    --text-color: white;
    --box-color: rgba(255,255,255,0.15);
    --btn-color: #6c5ce7;
    --delete-color: red;
}

body {
    background: var(--bg-color);
    color: var(--text-color);
    font-family: 'Segoe UI', sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
    margin: 0;
    padding: 20px 0 40px 0;
}

h1 { 
    margin: 0;
    padding: 20px 0 10px 0;
}

.box {
    background: var(--box-color);
    padding: 25px;
    border-radius: 20px;
    width: 380px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.25);
    display: flex;
    flex-direction: column;
    align-items: center;
}

.ocjena-card {
    display: flex;
    align-items: center;
    margin: 8px 0;
    padding: 12px;
    width: 100%;
    border-radius: 14px;
    background: rgba(255,255,255,0.2);
    gap: 10px;

    opacity: 0;
    transform: scale(0.8) translateY(-10px);
    animation: cardIn 0.5s forwards;
}

.ocjena-card input {
    width: 80px;
    padding: 10px;
    border-radius: 8px;
    border: none;
    text-align: center;
    font-size: 1.1em;
}

.delete {
    background: red;
    color: white;
    border: none;
    padding: 6px 12px;
    border-radius: 8px;
    cursor: pointer;
}

.btn-group {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    margin-top: 10px;
    justify-content: center;
}

button {
    padding: 10px 18px;
    border: none;
    border-radius: 12px;
    background: var(--btn-color);
    color: white;
    cursor: pointer;
}

.avg {
    text-align: center;
    margin-top: 15px;
}

.avg-number {
    font-size: 48px;
    font-weight: bold;
}

.small-label {
    font-size: 0.8em;
    opacity: 0.7;
}

.small {
    margin-top: 4px;
    animation: fadeIn 0.4s;
}

/* ANIMACIJE */
@keyframes cardIn {
    0% { opacity:0; transform: scale(0.8) translateY(-10px); }
    60% { transform: scale(1.05) translateY(3px); }
    100% { opacity:1; transform: scale(1) translateY(0); }
}

@keyframes avgPop {
    0% { transform: scale(0.7); opacity:0; }
    60% { transform: scale(1.2); }
    100% { transform: scale(1); opacity:1; }
}

@keyframes pulse {
    0%,100% { transform: scale(1); }
    50% { transform: scale(1.08); }
}

@keyframes fadeIn {
    from {opacity:0;}
    to {opacity:1;}
}
</style>
</head>

<body>

<h1>Kalkulator ocjena</h1>

<div class="box">
    <div id="ocjene"></div>

    <div class="btn-group">
        <button onclick="dodaj()">+ Dodaj</button>
        <button onclick="izracunaj()">Izračunaj</button>
        <button onclick="obrisiSve()">Obriši sve</button>
    </div>

    <div class="avg">
        <div class="avg-number" id="avg">0.00</div>
        <div class="small-label">Prosjek</div>
        <div class="small" id="msg"></div>
    </div>
</div>

<script>
function dodaj(v="") {
    const div = document.getElementById("ocjene");

    const wrap = document.createElement("div");
    wrap.className = "ocjena-card";

    const input = document.createElement("input");
    input.type = "number";
    input.placeholder = "1-5";
    input.value = v;

    const btn = document.createElement("button");
    btn.innerText = "X";
    btn.className = "delete";

    btn.onclick = () => {
        wrap.style.opacity = "0";
        wrap.style.transform = "scale(0.7)";
        setTimeout(()=>wrap.remove(), 300);
    };

    wrap.appendChild(input);
    wrap.appendChild(btn);
    div.appendChild(wrap);
}

function izracunaj(){
    const inputs = document.querySelectorAll("input");
    let suma=0, count=0;

    inputs.forEach(i=>{
        let v=Number(i.value);
        if(v>=1 && v<=5){ suma+=v; count++; }
    });

    const avg = document.getElementById("avg");
    const msg = document.getElementById("msg");

    if(count===0){
        avg.textContent="0.00";
        msg.textContent="";
        return;
    }

    let p=suma/count;
    avg.textContent=p.toFixed(2);

    // ANIMACIJA PROSJEKA
    avg.style.animation="avgPop 0.5s";

    msg.textContent =
      p>=4.5 ? "🔥 Odličan!" :
      p>=3.5 ? "👍 Vrlo dobar" :
      p>=2.5 ? "🙂 Dobar" :
      "😬 Moraš učiti";

    msg.style.animation="pulse 0.8s";

    avg.style.color = p>=4.5 ? "lightgreen" :
                      p>=3.5 ? "orange" :
                      p>=2.5 ? "yellow" : "red";
}

function obrisiSve(){
    document.getElementById("ocjene").innerHTML="";
    izracunaj();
}

// start
dodaj();
</script>

</body>
</html>
