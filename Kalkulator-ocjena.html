<!DOCTYPE html>
<html lang="hr">
<head>
<meta charset="UTF-8">
<title>Kalkulator ocjena</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
:root {
    /* 🌊 nova premium "ocean aurora" tema */
    --bg-color: linear-gradient(135deg, #0f172a, #0b3a5a, #1e1b4b);
    --text-color: #eaf2ff;

    --box-color: rgba(255,255,255,0.10);
    --box-border: rgba(255,255,255,0.15);

    --btn-color: linear-gradient(135deg, #38bdf8, #6366f1);
    --delete-color: #fb7185;

    --bg-light: linear-gradient(135deg, #f4f7ff, #e8ecff);
    --text-light: #111827;

    --box-light: rgba(255,255,255,0.85);
    --btn-light: #6366f1;
}

*{
    box-sizing:border-box;
    font-family: 'Segoe UI', sans-serif;
    -webkit-font-smoothing: antialiased;
}

body{
    margin:0;
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    padding:20px 0 40px;

    background: var(--bg-color);
    color: var(--text-color);
    transition:0.4s;
}

h1{
    margin:0;
    padding:20px 0 10px;
    font-size:2.2em;
    text-align:center;

    background: linear-gradient(90deg, #38bdf8, #a78bfa, #60a5fa);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

.box{
    width:440px;
    max-width:92%;
    padding:25px;
    border-radius:20px;

    background: var(--box-color);
    border:1px solid var(--box-border);
    backdrop-filter: blur(12px);

    box-shadow: 0 15px 35px rgba(0,0,0,0.35);

    display:flex;
    flex-direction:column;
    align-items:center;
}

.ocjena-card{
    display:flex;
    justify-content:center;
    align-items:center;
    margin:8px 0;
    padding:12px 15px;
    width:100%;
    border-radius:14px;

    background: rgba(255,255,255,0.08);
    gap:10px;
    transition:0.3s;
}

input{
    width:100px;
    padding:10px;
    border-radius:10px;
    border:1px solid rgba(255,255,255,0.2);
    background: rgba(255,255,255,0.06);
    color: var(--text-color);
    text-align:center;
    outline:none;
}

input:focus{
    border-color:#38bdf8;
    transform:scale(1.05);
}

button{
    padding:12px 18px;
    border:none;
    border-radius:12px;
    font-weight:bold;
    cursor:pointer;
    color:white;

    background: var(--btn-color);
    transition:0.2s;
}

button:hover{
    transform:scale(1.05);
    opacity:0.9;
}

.delete{
    background: var(--delete-color);
    padding:6px 12px;
}

.btn-group{
    display:flex;
    flex-wrap:wrap;
    gap:10px;
    margin-top:10px;
    justify-content:center;
    width:100%;
}

.avg{
    text-align:center;
    margin-top:15px;
}

.avg-number{
    font-size:48px;
    font-weight:bold;
    transition:0.4s;
}

.small-label{
    opacity:0.7;
    font-size:0.8em;
}

.small{
    opacity:0.85;
    font-size:0.9em;
}

/* light mode */
body.light{
    background: var(--bg-light);
    color: var(--text-light);
}

body.light .box{
    background: var(--box-light);
}

body.light input{
    color: var(--text-light);
}

body.light button{
    background: var(--btn-light);
}

/* animacija */
@keyframes pop{
    0%{transform:scale(0.8);}
    60%{transform:scale(1.2);}
    100%{transform:scale(1);}
}
</style>
</head>

<body>

<h1>Kalkulator ocjena</h1>

<div class="box">
    <div id="ocjene"></div>

    <div class="btn-group">
        <button onclick="dodaj()">+ Dodaj</button>
        <button onclick="izracunaj()">Izračunaj</button>
        <button onclick="obrisiSve()">🗑 Obriši sve</button>
        <button onclick="promijeniTemu()">💡 Tema</button>
    </div>

    <div class="avg">
        <div class="avg-number" id="avg">0.00</div>
        <div class="small" id="msg"></div>
    </div>
</div>

<script>

function promijeniTemu(){
    document.body.classList.toggle("light");
}

function dodaj(v=""){
    const wrap = document.createElement("div");
    wrap.className = "ocjena-card";

    const input = document.createElement("input");
    input.type = "number";
    input.min = 1;
    input.max = 5;
    input.value = v;

    input.oninput = izracunaj;

    const del = document.createElement("button");
    del.textContent = "X";
    del.className = "delete";
    del.onclick = () => {
        wrap.remove();
        izracunaj();
    };

    wrap.appendChild(input);
    wrap.appendChild(del);

    document.getElementById("ocjene").appendChild(wrap);

    izracunaj();
}

function izracunaj(){
    const inputs = document.querySelectorAll("input");

    let sum = 0, count = 0;

    inputs.forEach(i=>{
        let v = Number(i.value);
        if(v>=1 && v<=5){
            sum += v;
            count++;
        }
    });

    const avg = document.getElementById("avg");
    const msg = document.getElementById("msg");

    if(count===0){
        avg.textContent="0.00";
        msg.textContent="";
        return;
    }

    let p = sum / count;

    avg.textContent = p.toFixed(2);

    avg.style.animation="pop 0.5s";
    setTimeout(()=>avg.style.animation="",500);

    msg.textContent =
        p>=4.5 ? "🔥 Odličan" :
        p>=3.5 ? "👍 Vrlo dobar" :
        p>=2.5 ? "🙂 Dobar" :
        "😬 Treba učiti";
}

function obrisiSve(){
    document.getElementById("ocjene").innerHTML="";
    izracunaj();
}

dodaj();

</script>

</body>
</html>
