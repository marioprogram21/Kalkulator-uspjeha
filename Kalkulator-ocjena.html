<style>

/* reset */
html, body {
    width: 100%;
    height: 100%;
    margin: 0;
    padding: 0;
    overflow-x: hidden;
    font-family: 'Segoe UI', sans-serif;
}

/* DARK THEME */
body {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px 0 40px;

    background: #1a237e;
    color: white;

    transition: 0.3s ease;
}

/* LIGHT THEME ✔ */
body.light {
    background: #f0e6ff;
    color: #111;
}

/* BOX */
.box {
    width: 440px;
    max-width: 92%;
    padding: 25px;

    border-radius: 20px;

    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(10px);

    border: 1px solid rgba(255,255,255,0.12);

    box-shadow: 0 15px 35px rgba(0,0,0,0.35);

    display: flex;
    flex-direction: column;
    align-items: center;

    transition: 0.3s;
}

/* LIGHT BOX */
body.light .box {
    background: rgba(255,255,255,0.4);
}

/* INPUT */
input {
    width: 100px;
    padding: 10px;
    border-radius: 10px;
    border: none;
    text-align: center;
    font-size: 1.1em;

    background: rgba(255,255,255,0.06);
    color: white;
}

body.light input {
    color: #111;
    background: rgba(0,0,0,0.05);
}

/* BUTTON */
button {
    padding: 12px 18px;
    border: none;
    border-radius: 12px;
    font-weight: bold;
    cursor: pointer;

    background: #6c5ce7;
    color: white;

    transition: 0.25s;
}

button:hover {
    background: #5a4fcf;
    transform: scale(1.05);
}

/* delete */
.delete {
    background: #fb7185;
}

/* menu */
.menu-btn {
    background: linear-gradient(135deg, #22c55e, #4ade80);
}

.btn-group {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 10px;
    margin-top: 10px;
    width: 100%;
}

.avg {
    margin-top: 15px;
    text-align: center;
}

.avg-number {
    font-size: 48px;
    font-weight: bold;
}

.small {
    opacity: 0.85;
    font-size: 0.9em;
}

</style>
