<!DOCTYPE html>
<html lang="hr">
<head>
<meta charset="UTF-8">
<title>Kalkulator ocjena</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#667eea">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon.png">

<style>
* { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; margin:0; padding:0; }

body {
    height: 100vh;
    background: linear-gradient(135deg, #667eea, #764ba2); /* gradient pozadina */
    display: flex;
    justify-content: center;
    align-items: center;
    color: black;
    transition: 0.3s ease;
}

body.light {
    background: linear-gradient(135deg, #f0e6ff, #e0d4ff);
    color: #2c2c2c;
}

h1 {
    text-align: center;
    font-size: 2em;
    font-weight: bold;
    margin-bottom: 20px;
    text-shadow: 1px 1px 2px rgba(0,0,0,0.2);
}

.app {
    width: 360px;
    padding: 30px;
    border-radius: 25px;
    background: rgba(255,255,255,0.85); /* kartica glass efekt */
    box-shadow: 0 15px 35px rgba(0,0,0,0.2);
    display: flex;
    flex-direction: column;
    align-items: center;
}

.ocjena-card {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 12px;
    border-radius: 14px;
    margin-top: 6px;
    font-weight: bold;
    background: rgba(255,255,255,0.6);
    box-shadow: 0 4px 15px rgba(0,0,0,0.1);
}

.ocjena-card input {
    width: 60px;
    padding: 8px;
    border-radius: 6px;
    border: none;
    text-align: center;
}

.delete {
    background: rgba(0,0,0,0.1);
    border: none;
    color: black;
    border-radius: 8px;
    cursor: pointer;
    padding: 2px 6px;
    font-weight: bold;
    transition: background 0.2s;
}

.delete:hover { background: rgba(0,0,0,0.2); }

.btn-group {
    display: flex;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 10px;
    margin-top: 15px;
    width: 100%;
}

button {
    padding: 10px;
    border: none;
    border-radius: 12px;
    font-weight: bold;
    cursor: pointer;
    background: #333;
    color: white;
    transition: 0.2s;
}

button:hover { background: #555; }

.avg {
    text-align: center;
    margin-top: 20px;
}
.avg-number {
    font-size: 48px;
    font-weight: bold;
    color: black;
}
.small {
    opacity: 0.8;
    font-size: 0.9em;
    color: black;
}
</style>
</head>

<body>
<div class="app">
    <h1>Kalkulator ocjena</h1>
    <div id="ocjene"></div>

    <div class="btn-group">
        <button onclick="dodaj()">+ Dodaj</button>
        <button onclick="izracunaj()">Izračunaj</button>
        <button onclick="obrisiSve()">🗑 Obriši sve</button>
        <button onclick="promijeniTemu()">💡 Tema</button>
        <button onclick="window.location.href='index.html'">🏠 Menu</button>
        <button id="installBtn" style="display:none;">📲 Instaliraj app</button>
    </div>

    <div class="avg">
        <div class="avg-number" id="rezultat">0.00</div>
        <div class="small" id="poruka"></div>
    </div>
</div>

<script>
// Tema
function promijeniTemu(){
    document.body.classList.toggle('light');
    localStorage.setItem('tema', document.body.classList.contains('light') ? 'light' : 'dark');
}
if(localStorage.getItem('tema')==='light') document.body.classList.add('light');

// Dodavanje ocjena
function dodaj(v=""){
    const div = document.getElementById("ocjene");
    const wrap = document.createElement("div");
    wrap.className = "ocjena-card";

    const input = document.createElement("input");
    input.type = "number";
    input.placeholder = "1-5";
    input.value = v;
    input.oninput = spremi;

    const btn = document.createElement("button");
    btn.innerText = "X";
    btn.className = "delete";
    btn.onclick = () => { wrap.remove(); spremi(); };

    wrap.appendChild(input);
    wrap.appendChild(btn);
    div.appendChild(wrap);
    spremi();
}

// Izračun
function izracunaj(){
    const inputs = document.querySelectorAll("#ocjene input");
    let suma=0, count=0;

    inputs.forEach(i=>{
        let v=Number(i.value);
        if(v>=1 && v<=5){
            suma+=v;
            count++;
        }
    });

    if(count===0){
        rezultat.innerText="Unesi ocjene!";
        poruka.innerText="";
        return;
    }

    let p=suma/count;
    rezultat.innerText=p.toFixed(2);

    poruka.innerText =
      p>=4.5 ? "🔥 Odličan!" :
      p>=3.5 ? "👍 Vrlo dobar" :
      p>=2.5 ? "🙂 Dobar" :
      "😬 Moraš učiti";
}

// Obriši sve
function obrisiSve(){
    document.getElementById("ocjene").innerHTML = "";
    localStorage.removeItem("ocjene");
    rezultat.innerText="0.00";
    poruka.innerText="";
}

// Storage
function spremi(){
    const arr=[];
    document.querySelectorAll("#ocjene input").forEach(i=>arr.push(i.value));
    localStorage.setItem("ocjene", JSON.stringify(arr));
}

function ucitaj(){
    const data = JSON.parse(localStorage.getItem("ocjene"));
    if(data){ data.forEach(v=>dodaj(v)); } else dodaj();
}
ucitaj();

// PWA Instalacija
let deferredPrompt;
window.addEventListener('beforeinstallprompt', (e) => {
    e.preventDefault();
    deferredPrompt = e;
    const btn = document.getElementById('installBtn');
    btn.style.display = 'block';
    btn.addEventListener('click', () => {
        btn.style.display = 'none';
        deferredPrompt.prompt();
        deferredPrompt.userChoice.then(() => { deferredPrompt = null; });
    });
});
</script>
</body>
</html>
