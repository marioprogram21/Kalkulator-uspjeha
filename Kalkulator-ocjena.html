<!DOCTYPE html>
<html lang="hr">
<head>
<meta charset="UTF-8">
<title>Kalkulator ocjena</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#5b6cff">

<style>
:root {
    --bg-color: linear-gradient(135deg, #3a4edb, #6a5cff);
    --text-color: #ffffff;
    --box-color: rgba(255, 255, 255, 0.12);
    --btn-color: #5b6cff;
    --delete-color: #ff4d6d;

    --bg-light: linear-gradient(135deg, #f6f7ff, #e8ebff);
    --text-light: #111827;
    --box-light: rgba(255, 255, 255, 0.88);
    --btn-light: #5b6cff;
}

* {
    box-sizing: border-box;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
}

body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: var(--bg-color);
    color: var(--text-color);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px 0 40px;
    transition: all 0.4s ease;
}

h1 {
    margin: 0;
    padding: 20px 0 10px;
    font-size: 2.2em;
    text-align: center;
    background: linear-gradient(90deg, #ffffff, #c7d2fe);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

.box {
    background: var(--box-color);
    width: 440px;
    max-width: 92%;
    padding: 25px;
    border-radius: 20px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.25);
    display: flex;
    flex-direction: column;
    align-items: center;
    backdrop-filter: blur(10px);
}

.ocjena-card {
    display: flex;
    gap: 10px;
    width: 100%;
    margin: 8px 0;
    padding: 12px;
    border-radius: 14px;
    background: rgba(255,255,255,0.10);
    align-items: center;
}

.ocjena-card input {
    width: 100px;
    padding: 10px;
    border-radius: 8px;
    border: none;
    text-align: center;
    font-size: 1.1em;
}

button {
    padding: 12px 18px;
    border: none;
    border-radius: 12px;
    font-weight: bold;
    cursor: pointer;
    background: var(--btn-color);
    color: white;
    transition: 0.2s;
}

button:hover {
    transform: scale(1.05);
    opacity: 0.9;
}

.delete {
    background: var(--delete-color);
}

.btn-group {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    justify-content: center;
    margin-top: 10px;
}

.avg {
    margin-top: 15px;
    text-align: center;
}

.avg-number {
    font-size: 48px;
    font-weight: bold;
}

.small {
    opacity: 0.8;
    font-size: 0.9em;
}

/* light mode */
body.light {
    background: var(--bg-light);
    color: var(--text-light);
}

body.light .box {
    background: var(--box-light);
}

body.light button {
    background: var(--btn-light);
}

/* anim */
@keyframes pop {
    0% { transform: scale(0.8); }
    60% { transform: scale(1.2); }
    100% { transform: scale(1); }
}
</style>
</head>

<body>

<h1>Kalkulator ocjena</h1>

<div class="box">
    <div id="ocjene"></div>

    <div class="btn-group">
        <button onclick="dodaj()">+ Dodaj</button>
        <button onclick="izracunaj()">Izračunaj</button>
        <button onclick="obrisiSve()">🗑 Obriši sve</button>
        <button onclick="promijeniTemu()">💡 Tema</button>
    </div>

    <div class="avg">
        <div class="avg-number" id="avg">0.00</div>
        <div class="small" id="msg"></div>
    </div>
</div>

<script>

function promijeniTemu(){
    document.body.classList.toggle('light');
}

function dodaj(v=""){
    const wrap = document.createElement("div");
    wrap.className = "ocjena-card";

    const input = document.createElement("input");
    input.type = "number";
    input.min = 1;
    input.max = 5;
    input.value = v;

    input.oninput = izracunaj;

    const del = document.createElement("button");
    del.textContent = "X";
    del.className = "delete";
    del.onclick = () => {
        wrap.remove();
        izracunaj();
    };

    wrap.appendChild(input);
    wrap.appendChild(del);

    document.getElementById("ocjene").appendChild(wrap);

    izracunaj();
}

function izracunaj(){
    const inputs = document.querySelectorAll("input");
    let sum = 0, count = 0;

    inputs.forEach(i => {
        let v = Number(i.value);
        if(v >= 1 && v <= 5){
            sum += v;
            count++;
        }
    });

    const avg = document.getElementById("avg");
    const msg = document.getElementById("msg");

    if(count === 0){
        avg.textContent = "0.00";
        msg.textContent = "";
        return;
    }

    let p = sum / count;

    avg.textContent = p.toFixed(2);

    avg.style.animation = "pop 0.5s";
    setTimeout(() => avg.style.animation = "", 500);

    msg.textContent =
        p >= 4.5 ? "🔥 Odličan" :
        p >= 3.5 ? "👍 Vrlo dobar" :
        p >= 2.5 ? "🙂 Dobar" :
        "😬 Treba učiti";
}

function obrisiSve(){
    document.getElementById("ocjene").innerHTML = "";
    izracunaj();
}

dodaj();

</script>

</body>
</html>
