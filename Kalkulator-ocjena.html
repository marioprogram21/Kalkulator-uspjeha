<!DOCTYPE html>
<html lang="hr">
<head>
<meta charset="UTF-8">
<title>Kalkulator ocjena</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

/* 🔥 iPhone FIX */
html, body {
    height: 100%;
    margin: 0;
    padding: 0;
}

:root {
    --bg-color: linear-gradient(135deg, #0f172a, #0b3a5a, #1e1b4b);
    --text-color: #ffffff;

    --box-color: rgba(255,255,255,0.10);
    --box-light: rgba(255,255,255,0.85);

    --btn-color: #38bdf8;
    --delete-color: #fb7185;

    --bg-light: linear-gradient(135deg, #f4f7ff, #e8ecff);
    --text-light: #111827;
}

body {
    min-height: 100vh;
    min-height: 100dvh; /* 🔥 iPhone safe */

    background: var(--bg-color);
    background-attachment: fixed; /* full screen fix */

    color: var(--text-color);
    font-family: 'Segoe UI', sans-serif;

    display: flex;
    flex-direction: column;
    align-items: center;

    margin: 0;
    padding: 20px 0 40px;

    transition: 0.4s;
}

/* 🔥 extra safety layer (fix white edges) */
body::before {
    content: "";
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: var(--bg-color);
    z-index: -1;
}

h1 {
    margin: 0;
    padding: 20px 0 10px;
    text-align: center;

    font-size: 2.2em;
    font-weight: bold;

    background: linear-gradient(90deg, #38bdf8, #a78bfa, #60a5fa);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

.box {
    width: 440px;
    max-width: 92%;
    padding: 25px;

    border-radius: 20px;

    background: var(--box-color);
    box-shadow: 0 15px 35px rgba(0,0,0,0.35);

    display: flex;
    flex-direction: column;
    align-items: center;

    backdrop-filter: blur(12px);
}

.ocjena-card {
    display: flex;
    justify-content: center;
    align-items: center;

    margin: 8px 0;
    padding: 12px 15px;
    width: 100%;

    border-radius: 14px;
    background: rgba(255,255,255,0.08);

    gap: 10px;
}

input {
    width: 100px;
    padding: 10px;

    border-radius: 10px;
    border: none;

    text-align: center;
    font-size: 1.1em;

    background: rgba(255,255,255,0.06);
    color: white;
}

button {
    padding: 12px 18px;

    border: none;
    border-radius: 12px;

    font-weight: bold;
    cursor: pointer;

    background: var(--btn-color);
    color: white;

    transition: 0.2s;
}

button:hover {
    transform: scale(1.05);
    opacity: 0.9;
}

.delete {
    background: var(--delete-color);
    padding: 6px 12px;
}

.btn-group {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 10px;
    margin-top: 10px;
    width: 100%;
}

.avg {
    text-align: center;
    margin-top: 15px;
}

.avg-number {
    font-size: 48px;
    font-weight: bold;
}

.small {
    opacity: 0.85;
    font-size: 0.9em;
}

/* light mode */
body.light {
    background: var(--bg-light);
    color: var(--text-light);
}

body.light .box {
    background: var(--box-light);
}

/* anim */
@keyframes pop {
    0% { transform: scale(0.8); }
    60% { transform: scale(1.2); }
    100% { transform: scale(1); }
}

</style>
</head>

<body>

<h1>Kalkulator ocjena</h1>

<div class="box">
    <div id="ocjene"></div>

    <div class="btn-group">
        <button onclick="dodaj()">+ Dodaj</button>
        <button onclick="izracunaj()">Izračunaj</button>
        <button onclick="obrisiSve()">🗑 Obriši sve</button>
        <button onclick="promijeniTemu()">💡 Tema</button>
        <button onclick="window.location.href='index.html'">🏠 Menu</button>
    </div>

    <div class="avg">
        <div class="avg-number" id="avg">0.00</div>
        <div class="small" id="msg"></div>
    </div>
</div>

<script>

function promijeniTemu(){
    document.body.classList.toggle('light');
}

function dodaj(v=""){
    const wrap = document.createElement("div");
    wrap.className = "ocjena-card";

    const input = document.createElement("input");
    input.type = "number";
    input.min = 1;
    input.max = 5;
    input.value = v;

    input.oninput = izracunaj;

    const btn = document.createElement("button");
    btn.textContent = "X";
    btn.className = "delete";

    btn.onclick = () => {
        wrap.remove();
        izracunaj();
    };

    wrap.appendChild(input);
    wrap.appendChild(btn);

    document.getElementById("ocjene").appendChild(wrap);

    izracunaj();
}

function izracunaj(){
    const inputs = document.querySelectorAll("input");

    let sum = 0, count = 0;

    inputs.forEach(i=>{
        let v = Number(i.value);
        if(v>=1 && v<=5){
            sum += v;
            count++;
        }
    });

    const avg = document.getElementById("avg");
    const msg = document.getElementById("msg");

    if(count===0){
        avg.textContent="0.00";
        msg.textContent="";
        return;
    }

    let p = sum / count;

    avg.textContent = p.toFixed(2);

    avg.style.animation = "pop 0.5s";
    setTimeout(()=> avg.style.animation="", 500);

    msg.textContent =
        p>=4.5 ? "🔥 Odličan" :
        p>=3.5 ? "👍 Vrlo dobar" :
        p>=2.5 ? "🙂 Dobar" :
        "😬 Treba učiti";
}

function obrisiSve(){
    document.getElementById("ocjene").innerHTML = "";
    izracunaj();
}

dodaj();

</script>

</body>
</html>
