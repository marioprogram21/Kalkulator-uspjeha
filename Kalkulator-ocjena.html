<!DOCTYPE html>
<html lang="hr">
<head>
<meta charset="UTF-8">
<title>Kalkulator ocjena</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#667eea">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon.png">

<style>
:root {
    --bg-color: linear-gradient(135deg, #667eea, #764ba2);
    --text-color: white;
    --box-color: rgba(255,255,255,0.15);
    --btn-color: #6c5ce7;
    --delete-color: red;

    --bg-light: linear-gradient(135deg, #f0e6ff, #e0d4ff);
    --text-light: black;
    --box-light: rgba(255,255,255,0.85);
    --btn-light: #6c5ce7;
}

body {
    background: var(--bg-color);
    color: var(--text-color);
    font-family: 'Segoe UI', sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
    margin: 0;
    padding: 20px 0 40px 0;
    transition: all 0.5s ease;
}

body.light { 
    background: var(--bg-light);
    color: var(--text-light);
}

h1 { 
    margin: 0;
    padding: 20px 0 10px 0;
    text-align: center; 
}

.box {
    background: var(--box-color);
    padding: 35px;           /* veći padding */
    border-radius: 20px;
    width: 280px;            /* manja širina = više udaljeno */
    box-shadow: 0 20px 50px rgba(0,0,0,0.4); /* jači shadow */
    display: flex;
    flex-direction: column;
    align-items: center;
    transition: all 0.5s ease;
    transform: scale(0.95);  /* manja skala = udaljeniji efekt */
}
body.light .box { background: var(--box-light); }

.ocjena-card {
    display: flex;
    justify-content: center;
    align-items: center;
    margin: 8px 0;
    padding: 12px 15px;
    width: 100%;
    border-radius: 14px;
    background: var(--box-color);
    font-weight: bold;
    gap: 10px;
    transform: scale(0);
    animation: cardIn 0.5s forwards;
    transition: all 0.3s;
}
body.light .ocjena-card { background: var(--box-light); }

.ocjena-card input {
    width: 70px;
    padding: 10px;
    border-radius: 8px;
    border: none;
    text-align: center;
    font-size: 1.1em;
}

.delete {
    background: var(--delete-color);
    color: white;
    border: none;
    padding: 6px 12px;
    border-radius: 8px;
    cursor: pointer;
    font-weight: bold;
    font-size: 0.9em;
    transition: all 0.3s;
}
.delete:hover { opacity: 0.8; transform: scale(1.05); }

.btn-group {
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
    gap: 10px;
    margin-top: 10px;
    width: 100%;
}

button {
    padding: 10px 18px;
    border: none;
    border-radius: 12px;
    font-size: 1em;
    font-weight: bold;
    background: var(--btn-color);
    color: white;
    cursor: pointer;
    transition: all 0.3s;
}
body.light button { background: var(--btn-light); }
button:hover { transform: scale(1.1); opacity: 0.85; }

.avg { text-align: center; margin-top: 20px; }
.avg-number { 
    font-size: 52px; 
    font-weight: bold; 
    letter-spacing: 1px; 
    margin-bottom:4px; 
    transition: all 0.5s ease; 
    animation: bounce 0.6s; 
}
.small-label { 
    opacity: 0.7; 
    font-size: 0.8em; 
    margin-top:4px; 
    animation: fadeIn 0.7s;
}
.small { 
    opacity: 0.85; 
    font-size: 0.9em; 
    margin-top:2px; 
    animation: fadeIn 0.7s;
}

footer { margin-top: 25px; opacity:0.7; text-align:center; }

/* Animacije */
@keyframes cardIn { from { transform: scale(0.5); opacity:0; } to { transform: scale(1); opacity:1; } }
@keyframes fadeTheme { from {opacity:0.5;} to {opacity:1;} }
@keyframes bounce {
    0% { transform: translateY(-12px); }
    50% { transform: translateY(6px); }
    100% { transform: translateY(0); }
}
@keyframes fadeIn { from {opacity:0;} to {opacity:1;} }

</style>
</head>

<body>
<h1>Kalkulator ocjena</h1>

<div class="box" id="box">
    <div id="ocjene"></div>

    <div class="btn-group">
        <button onclick="dodaj()">+ Dodaj</button>
        <button onclick="izracunaj()">Izračunaj</button>
        <button onclick="obrisiSve()">🗑 Obriši sve</button>
        <button onclick="promijeniTemu()">💡 Tema</button>
        <button onclick="window.location.href='index.html'">🏠 Menu</button>
        <button id="installBtn" style="display:none;">📲 Instaliraj app</button>
    </div>

    <div class="avg">
        <div class="avg-number" id="avg">0.00</div>
        <div class="small-label">Prosjek</div>
        <div class="small" id="avg-msg"></div>
    </div>
</div>

<footer>Napravio Mario</footer>

<script>
// Tema
function promijeniTemu(){
    document.body.classList.toggle('light');
    document.getElementById("box").style.animation = "fadeTheme 0.5s";
    localStorage.setItem('tema', document.body.classList.contains('light') ? 'light' : 'dark');
}
if(localStorage.getItem('tema')==='light') document.body.classList.add('light');

// Dodavanje ocjena
let grades = JSON.parse(localStorage.getItem("grades")) || [];

function save() { localStorage.setItem("grades", JSON.stringify(grades)); }

function dodaj(v="") {
    const div = document.getElementById("ocjene");
    const wrap = document.createElement("div");
    wrap.className = "ocjena-card";

    const input = document.createElement("input");
    input.type = "number";
    input.placeholder = "1-5";
    input.value = v;
    input.oninput = spremi;

    const btn = document.createElement("button");
    btn.innerText = "X";
    btn.className = "delete";
    btn.onclick = () => { wrap.remove(); spremi(); izracunaj(); };

    wrap.appendChild(input);
    wrap.appendChild(btn);
    div.appendChild(wrap);
    wrap.style.animation = "cardIn 0.5s forwards";
    spremi();
    izracunaj();
}

function izracunaj(){
    const inputs = document.querySelectorAll("#ocjene input");
    let suma=0, count=0;

    inputs.forEach(i=>{
        let v=Number(i.value);
        if(v>=1 && v<=5){ suma+=v; count++; }
    });

    const rezultat = document.getElementById("avg");
    const poruka = document.getElementById("avg-msg");

    if(count===0){
        rezultat.textContent="0.00";
        poruka.textContent="";
        return;
    }

    let p=suma/count;
    rezultat.textContent = p.toFixed(2);

    poruka.textContent =
      p>=4.5 ? "🔥 Odličan!" :
      p>=3.5 ? "👍 Vrlo dobar" :
      p>=2.5 ? "🙂 Dobar" :
      "😬 Moraš učiti";

    rezultat.style.color = p>=4.5 ? "lightgreen" : p>=3.5 ? "orange" : p>=2.5 ? "yellow" : "red";
    rezultat.style.animation = "bounce 0.6s";
}

function obrisiSve(){
    const div = document.getElementById("ocjene");
    div.innerHTML = "";
    grades = [];
    save();
    izracunaj();
}

// Storage
function spremi(){
    grades = [];
    document.querySelectorAll("#ocjene input").forEach(i=>grades.push(i.value));
    localStorage.setItem("grades", JSON.stringify(grades));
}

function ucitaj(){
    const data = JSON.parse(localStorage.getItem("grades"));
    if(data && data.length>0){ data.forEach(v=>dodaj(v)); } else dodaj();
}
ucitaj();

// PWA Instalacija
let deferredPrompt;
window.addEventListener('beforeinstallprompt', (e) => {
    e.preventDefault();
    deferredPrompt = e;
    const btn = document.getElementById('installBtn');
    btn.style.display = 'block';
    btn.addEventListener('click', () => {
        btn.style.display = 'none';
        deferredPrompt.prompt();
        deferredPrompt.userChoice.then(() => { deferredPrompt = null; });
    });
});
</script>

</body>
</html>
