<!DOCTYPE html>
<html lang="hr">
<head>
<meta charset="UTF-8">
<title>Kalkulator ocjena</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#667eea">
<link rel="manifest" href="manifest.json">

<style>
:root {
    --bg-color: linear-gradient(135deg, #667eea, #764ba2);
    --text-color: white;
    --box-color: rgba(255,255,255,0.15);
    --btn-color: #6c5ce7;
    --delete-color: red;

    --bg-light: linear-gradient(135deg, #f0e6ff, #e0d4ff);
    --text-light: black;
    --box-light: rgba(255,255,255,0.85);
}

body {
    background: var(--bg-color);
    color: var(--text-color);
    font-family: 'Segoe UI', sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    margin: 0;
}

body.light {
    background: var(--bg-light);
    color: var(--text-light);
}

h1 {
    margin: 10px 0;
}

/* 🔥 GLAVNI FIX */
.box {
    background: var(--box-color);
    padding: 15px;
    border-radius: 20px;
    width: 360px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.25);

    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px; /* sve kontrolira */
}
body.light .box { background: var(--box-light); }

#ocjene {
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 4px;
}

.ocjena-card {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 8px 10px;
    width: 100%;
    border-radius: 12px;
    background: var(--box-color);
}
body.light .ocjena-card { background: var(--box-light); }

.ocjena-card input {
    width: 60px;
    padding: 6px;
    border-radius: 6px;
    border: none;
    text-align: center;
}

/* veći X */
.delete {
    background: red;
    color: white;
    border: none;
    padding: 4px 8px;
    border-radius: 6px;
    cursor: pointer;
    font-weight: bold;
}

/* nema rupe */
.btn-group {
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
    gap: 8px;
    width: 100%;
    margin: 0;
}

button {
    padding: 8px 12px;
    border: none;
    border-radius: 10px;
    background: var(--btn-color);
    color: white;
    font-weight: bold;
    cursor: pointer;
}

.avg {
    text-align: center;
    margin: 0;
}

.avg-number {
    font-size: 32px;
    font-weight: bold;
}

.small {
    font-size: 0.9em;
}

footer {
    margin: 10px 0;
    opacity: 0.7;
}
</style>
</head>

<body>

<h1>Kalkulator ocjena</h1>

<div class="box">
    <div id="ocjene"></div>

    <div class="btn-group">
        <button onclick="dodaj()">+ Dodaj</button>
        <button onclick="izracunaj()">Izračunaj</button>
        <button onclick="obrisiSve()">🗑 Obriši</button>
        <button onclick="promijeniTemu()">💡 Tema</button>
        <button onclick="location.href='index.html'">🏠 Menu</button>
    </div>

    <div class="avg">
        <div class="avg-number" id="avg">0.00</div>
        <div class="small">Prosjek</div>
    </div>
</div>

<footer>Napravio Mario</footer>

<script>
function promijeniTemu(){
    document.body.classList.toggle('light');
}

// dodaj
function dodaj(v=""){
    const div = document.getElementById("ocjene");

    const wrap = document.createElement("div");
    wrap.className = "ocjena-card";

    const input = document.createElement("input");
    input.type = "number";
    input.placeholder = "1-5";
    input.value = v;

    const btn = document.createElement("button");
    btn.innerText = "X";
    btn.className = "delete";
    btn.onclick = () => wrap.remove();

    wrap.appendChild(input);
    wrap.appendChild(btn);
    div.appendChild(wrap);
}

// izračun
function izracunaj(){
    const inputs = document.querySelectorAll("#ocjene input");
    let sum=0, count=0;

    inputs.forEach(i=>{
        let v=Number(i.value);
        if(v>=1 && v<=5){
            sum+=v;
            count++;
        }
    });

    document.getElementById("avg").textContent =
        count ? (sum/count).toFixed(2) : "0.00";
}

// briši
function obrisiSve(){
    document.getElementById("ocjene").innerHTML="";
}

// start
dodaj();
</script>

</body>
</html>
