<!DOCTYPE html>
<html lang="hr">
<head>
<meta charset="UTF-8">
<title>Kalkulator ocjena</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
html, body {
    width: 100%;
    height: 100%;
    margin: 0;
    padding: 0;
    overflow-x: hidden;
}

body {
    min-height: 100vh;
    min-height: -webkit-fill-available;
    min-height: 100dvh;

    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px 0 40px;

    position: relative;
    color: white;
    font-family: 'Segoe UI', sans-serif;
}

body::before {
    content: "";
    position: fixed;
    top: -80px;
    left: -80px;
    right: -80px;
    bottom: -80px;

    background: linear-gradient(135deg, #0f172a, #0b3a5a, #1e1b4b);
    z-index: -999;
}

h1 {
    margin: 0;
    padding: 20px 0 10px;
    text-align: center;
    font-size: 2.2em;
    background: linear-gradient(90deg, #38bdf8, #a78bfa, #60a5fa);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

.box {
    width: 440px;
    max-width: 92%;
    padding: 25px;
    border-radius: 20px;
    background: rgba(255,255,255,0.10);
    backdrop-filter: blur(12px);
    box-shadow: 0 15px 35px rgba(0,0,0,0.35);
    display: flex;
    flex-direction: column;
    align-items: center;
}

.ocjena-card {
    display: flex;
    justify-content: center;
    align-items: center;
    margin: 8px 0;
    padding: 12px 15px;
    width: 100%;
    border-radius: 14px;
    background: rgba(255,255,255,0.08);
    gap: 10px;
}

input {
    width: 100px;
    padding: 10px;
    border-radius: 10px;
    border: none;
    text-align: center;
    font-size: 1.1em;
    background: rgba(255,255,255,0.06);
    color: white;
}

button {
    padding: 12px 18px;
    border: none;
    border-radius: 12px;
    font-weight: bold;
    cursor: pointer;
    background: #38bdf8;
    color: white;
}

button:hover {
    opacity: 0.9;
}

.btn-group {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 10px;
    margin-top: 10px;
    width: 100%;
}

.avg-number {
    font-size: 48px;
    font-weight: bold;
    text-align: center;
}
</style>
</head>

<body>

<h1>Kalkulator ocjena</h1>

<div class="box">
    <div id="ocjene"></div>

    <div class="btn-group">
        <button onclick="dodaj()">+ Dodaj</button>
        <button onclick="izracunaj()">Izračunaj</button>
        <button onclick="obrisiSve()">🗑 Obriši sve</button>
        <button onclick="window.location.href='index.html'">🏠 Menu</button>
    </div>

    <div class="avg-number" id="avg">0.00</div>
</div>

<script>
function dodaj(v=""){
    const wrap = document.createElement("div");
    wrap.className = "ocjena-card";

    const input = document.createElement("input");
    input.type = "number";
    input.min = 1;
    input.max = 5;
    input.value = v;

    input.oninput = izracunaj;

    const btn = document.createElement("button");
    btn.textContent = "X";
    btn.onclick = () => wrap.remove();

    wrap.appendChild(input);
    wrap.appendChild(btn);

    document.getElementById("ocjene").appendChild(wrap);
    izracunaj();
}

function izracunaj(){
    const inputs = document.querySelectorAll("input");
    let sum = 0, count = 0;

    inputs.forEach(i=>{
        let v = Number(i.value);
        if(v>=1 && v<=5){
            sum += v;
            count++;
        }
    });

    document.getElementById("avg").textContent =
        count ? (sum/count).toFixed(2) : "0.00";
}

function obrisiSve(){
    document.getElementById("ocjene").innerHTML = "";
    izracunaj();
}
</script>

</body>
</html>
