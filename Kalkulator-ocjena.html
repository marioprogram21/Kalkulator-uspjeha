<!DOCTYPE html>
<html lang="hr">
<head>
<meta charset="UTF-8">
<title>Kalkulator ocjena</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
:root {
    --bg-color: linear-gradient(135deg, #667eea, #764ba2);
    --text-color: white;
    --box-color: rgba(255,255,255,0.15);
    --btn-color: #6c5ce7;
    --delete-color: red;
}

body {
    background: var(--bg-color);
    color: var(--text-color);
    font-family: 'Segoe UI', sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
    margin: 0;
    padding: 20px;
}

.box {
    background: var(--box-color);
    padding: 25px;
    border-radius: 20px;
    width: 380px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.25);
}

.ocjena-card {
    display: flex;
    gap: 10px;
    margin: 8px 0;
    padding: 12px;
    border-radius: 14px;
    background: rgba(255,255,255,0.2);
}

/* ANIMACIJA SE AKTIVIRA KLASOM */
.ocjena-card.animate {
    animation: cardIn 0.5s ease;
}

.ocjena-card input {
    width: 80px;
    padding: 10px;
    border-radius: 8px;
    border: none;
    text-align: center;
}

.delete {
    background: red;
    color: white;
    border: none;
    border-radius: 8px;
    padding: 6px 12px;
    cursor: pointer;
}

button {
    margin-top: 10px;
    padding: 10px 15px;
    border: none;
    border-radius: 10px;
    background: var(--btn-color);
    color: white;
    cursor: pointer;
}

.avg {
    text-align: center;
    margin-top: 15px;
}

.avg-number {
    font-size: 48px;
    font-weight: bold;
}

/* ANIMACIJE */
@keyframes cardIn {
    0% { transform: scale(0.7) translateY(-10px); opacity:0; }
    60% { transform: scale(1.1) translateY(3px); opacity:1; }
    100% { transform: scale(1); }
}

@keyframes avgPop {
    0% { transform: scale(0.7); opacity:0; }
    60% { transform: scale(1.2); }
    100% { transform: scale(1); opacity:1; }
}
</style>
</head>

<body>

<h2>Kalkulator ocjena</h2>

<div class="box">
    <div id="ocjene"></div>

    <button onclick="dodaj()">+ Dodaj</button>
    <button onclick="izracunaj()">Izračunaj</button>

    <div class="avg">
        <div id="avg" class="avg-number">0.00</div>
        <div id="msg"></div>
    </div>
</div>

<script>
function dodaj(v="") {
    const div = document.getElementById("ocjene");

    const wrap = document.createElement("div");
    wrap.className = "ocjena-card";

    const input = document.createElement("input");
    input.type = "number";
    input.value = v;

    const btn = document.createElement("button");
    btn.innerText = "X";
    btn.className = "delete";

    btn.onclick = () => wrap.remove();

    wrap.appendChild(input);
    wrap.appendChild(btn);
    div.appendChild(wrap);

    // 🔥 TRIGGER ANIMACIJE NAKON DODAVANJA
    setTimeout(() => {
        wrap.classList.add("animate");
    }, 10);
}

function izracunaj(){
    const inputs = document.querySelectorAll("input");
    let suma=0, count=0;

    inputs.forEach(i=>{
        let v=Number(i.value);
        if(v>=1 && v<=5){ suma+=v; count++; }
    });

    const avg = document.getElementById("avg");
    const msg = document.getElementById("msg");

    if(count===0){
        avg.textContent="0.00";
        msg.textContent="";
        return;
    }

    let p=suma/count;
    avg.textContent=p.toFixed(2);

    // animacija prosjeka
    avg.style.animation="none";
    void avg.offsetWidth; // reset animacije
    avg.style.animation="avgPop 0.5s";

    msg.textContent =
      p>=4.5 ? "🔥 Odličan!" :
      p>=3.5 ? "👍 Vrlo dobar" :
      p>=2.5 ? "🙂 Dobar" :
      "😬 Moraš učiti";
}

// start
dodaj();
</script>

</body>
</html>
