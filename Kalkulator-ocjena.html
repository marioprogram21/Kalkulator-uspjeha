<!DOCTYPE html>
<html lang="hr">
<head>
<meta charset="UTF-8">
<title>Kalkulator ocjena</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    background: #1a237e; /* ✔ ISTA BOJA */
    color: white;
    font-family: 'Segoe UI', sans-serif;
    margin: 0;
    display: flex;
    justify-content: center;
    padding: 20px;
}

.box {
    width: 420px;
    max-width: 95%;
    padding: 25px;
    border-radius: 20px;
    background: rgba(255,255,255,0.08);
}

h1 {
    text-align: center;
}

.ocjena-card {
    display: flex;
    justify-content: space-between;
    margin: 8px 0;
}

input {
    width: 100px;
    padding: 10px;
    border-radius: 10px;
    border: none;
}

button {
    padding: 10px 14px;
    border-radius: 10px;
    border: none;
    cursor: pointer;
    background: #6c5ce7;
    color: white;
}

button:hover {
    background: #5a4fcf;
}

.btn-group {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    margin-top: 10px;
}

.avg-number {
    font-size: 40px;
    text-align: center;
    margin-top: 15px;
}
</style>
</head>

<body>

<div class="box">

<h1>Kalkulator ocjena</h1>

<div id="ocjene"></div>

<div class="btn-group">
    <button onclick="dodaj()">+ Dodaj</button>
    <button onclick="izracunaj()">Izračunaj</button>
    <button onclick="obrisiSve()">🗑 Obriši</button>
    <button onclick="location.href='index.html'">🏠 Menu</button>
</div>

<div class="avg-number" id="avg">0.00</div>

</div>

<script>
function dodaj(){
    const wrap=document.createElement("div");
    wrap.className="ocjena-card";

    const input=document.createElement("input");
    input.type="number";
    input.min=1;
    input.max=5;

    const btn=document.createElement("button");
    btn.textContent="X";
    btn.onclick=()=>wrap.remove();

    wrap.appendChild(input);
    wrap.appendChild(btn);

    document.getElementById("ocjene").appendChild(wrap);
}

function izracunaj(){
    const inputs=document.querySelectorAll("input");
    let sum=0,count=0;

    inputs.forEach(i=>{
        let v=Number(i.value);
        if(v>=1 && v<=5){ sum+=v; count++; }
    });

    document.getElementById("avg").textContent=
        count?(sum/count).toFixed(2):"0.00";
}

function obrisiSve(){
    document.getElementById("ocjene").innerHTML="";
    izracunaj();
}
</script>

</body>
</html>
