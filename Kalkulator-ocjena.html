<!DOCTYPE html>
<html lang="hr">
<head>
<meta charset="UTF-8">
<title>Kalkulator ocjena</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#667eea">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon.png">

<style>
:root {
    --bg-dark: linear-gradient(135deg, #667eea, #764ba2);  /* tamna ljubičasto-plava */
    --bg-light: linear-gradient(135deg, #f0e6ff, #e0d4ff); /* svijetla tema */
    --text-dark: black;
    --text-light: #2c2c2c;
    --card-dark: rgba(255,255,255,0.6);
    --card-light: rgba(255,255,255,0.85);
    --btn-dark: #333;
    --btn-light: #6c5ce7;
}
body {
    background: var(--bg-dark);
    color: var(--text-dark);
    font-family: 'Segoe UI', sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
    margin: 0;
    padding: 20px;
    transition: all 0.3s ease;
}

body.light {
    background: var(--bg-light);
    color: var(--text-light);
}

h1 { margin-bottom: 20px; text-align:center; }
.box {
    background: var(--card-dark);
    padding: 25px;
    border-radius: 20px;
    width: 360px;
    box-shadow: 0 15px 35px rgba(0,0,0,0.2);
    display: flex;
    flex-direction: column;
    align-items: center;
    transition: background 0.3s ease;
}
body.light .box { background: var(--card-light); }

.ocjena-card {
    display: flex;
    justify-content: space-between;
    margin: 8px 0;
    padding: 10px 12px;
    width: 100%;
    border-radius: 12px;
    font-weight: bold;
    background: rgba(255,255,255,0.6);
    transition: background 0.3s ease;
}
body.light .ocjena-card { background: rgba(255,255,255,0.85); }

.ocjena-card input {
    width: 60px;
    padding: 8px;
    border-radius: 6px;
    border: none;
    text-align: center;
}

.delete {
    background: red;
    color: white;
    border: none;
    padding: 2px 6px;
    border-radius: 8px;
    cursor: pointer;
    font-weight: bold;
    font-size: 0.8em;
}

.btn-group {
    display: flex;
    justify-content: space-between;
    gap: 10px;
    flex-wrap: wrap;
    margin-top: 15px;
    width: 100%;
}

button {
    padding: 10px 15px;
    border: none;
    border-radius: 12px;
    font-size: 1em;
    font-weight: bold;
    background: var(--btn-dark);
    color: white;
    cursor: pointer;
    transition: 0.2s;
}
body.light button { background: var(--btn-light); color: white; }
button:hover { opacity: 0.85; }

.cards { margin-top: 15px; }

.avg { text-align: center; margin-top: 20px; }
.avg-number { font-size: 48px; font-weight: bold; letter-spacing: 1px; color:black; }
body.light .avg-number { color: black; }
.small { opacity: 0.8; font-size: 0.9em; color:black; }
body.light .small { color:black; }

footer { margin-top: auto; opacity: 0.7; text-align:center; }

</style>
</head>
<body>

<h1>Kalkulator ocjena</h1>

<div class="box">
    <div id="ocjene"></div>

    <div class="btn-group">
        <button onclick="dodaj()">+ Dodaj</button>
        <button onclick="izracunaj()">Izračunaj</button>
        <button onclick="obrisiSve()">🗑 Obriši sve</button>
        <button onclick="promijeniTemu()">💡 Tema</button>
        <button onclick="window.location.href='index.html'">🏠 Menu</button>
        <button id="installBtn" style="display:none;">📲 Instaliraj app</button>
    </div>

    <div class="cards" id="cards"></div>

    <div class="avg">
        <div class="avg-number" id="avg">0.00</div>
        <div class="small">Prosjek</div>
    </div>
</div>

<footer>Napravio Mario</footer>

<script>
// Tema
function promijeniTemu(){
    document.body.classList.toggle('light');
    localStorage.setItem('tema', document.body.classList.contains('light') ? 'light' : 'dark');
}
if(localStorage.getItem('tema')==='light') document.body.classList.add('light');

// Dodavanje ocjena
let grades = JSON.parse(localStorage.getItem("grades")) || [];

function save() { localStorage.setItem("grades", JSON.stringify(grades)); }

function add() {
    const subject = prompt("Unesi predmet:") || "";
    const grade = parseInt(prompt("Unesi ocjenu (1-5):") || 0);
    if (!subject || grade < 1 || grade > 5) return;
    grades.push({ subject, grade });
    save();
    render();
}

function remove(i) { grades.splice(i, 1); save(); render(); }

function removeAll() { grades = []; save(); render(); }

function render() {
    const container = document.getElementById("cards");
    container.innerHTML = "";
    grades.forEach((g, i) => {
        const card = document.createElement("div");
        card.className = "ocjena-card";
        card.innerHTML = `<span>${g.subject}</span>
                          <span class="grade">${g.grade}</span>`;
        const btn = document.createElement("button");
        btn.className = "delete";
        btn.textContent = "x";
        btn.onclick = () => remove(i);
        card.appendChild(btn);
        container.appendChild(card);
    });
    calc();
}

function calc() {
    if (grades.length === 0) {
        document.getElementById("avg").textContent = "0.00";
        return;
    }
    let sum = grades.reduce((a,b)=>a+b.grade,0);
    let avg = (sum / grades.length).toFixed(2);
    const avgElem = document.getElementById("avg");
    avgElem.textContent = avg;
    if(avg>=4.5) avgElem.style.color = "green";
    else if(avg>=3.5) avgElem.style.color = "orange";
    else avgElem.style.color = "red";
}

render();

// PWA Instalacija
let deferredPrompt;
window.addEventListener('beforeinstallprompt', (e) => {
    e.preventDefault();
    deferredPrompt = e;
    const btn = document.getElementById('installBtn');
    btn.style.display = 'block';
    btn.addEventListener('click', () => {
        btn.style.display = 'none';
        deferredPrompt.prompt();
        deferredPrompt.userChoice.then(() => { deferredPrompt = null; });
    });
});
</script>

</body>
</html>
