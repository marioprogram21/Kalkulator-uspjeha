<style>
:root {
    --bg1: #1a237e;
    --accent: #6c5ce7;
    --accent2: #5a4fcf;
}

html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    font-family: 'Segoe UI', sans-serif;
}

body {
    display: flex;
    justify-content: center;
    align-items: center;
    background: var(--bg1);
    color: white;
}

/* GLAVNI PROZOR */
.box {
    width: 420px;
    max-width: 92%;
    padding: 25px;
    border-radius: 20px;

    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(12px);

    box-shadow: 0 15px 35px rgba(0,0,0,0.35);

    display: flex;
    flex-direction: column;
    align-items: center;
}

/* NASLOV */
h1 {
    margin-bottom: 20px;
    text-align: center;
}

/* OCJENE */
.ocjena-card {
    display: flex;
    gap: 10px;
    margin: 8px 0;
    width: 100%;
    justify-content: center;
}

/* INPUT */
input {
    width: 110px;
    padding: 10px;
    border-radius: 10px;
    border: none;
    text-align: center;
    font-size: 1.1em;
}

/* GUMBI */
button {
    padding: 12px 18px;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    font-weight: bold;
    background: var(--accent);
    color: white;
    transition: 0.2s;
}

button:hover {
    background: var(--accent2);
    transform: scale(1.05);
}

/* DELETE */
.delete {
    background: #fb7185;
    padding: 6px 12px;
}

/* MENU BUTTON */
.menu-btn {
    background: linear-gradient(135deg, #22c55e, #4ade80);
}

.btn-group {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    justify-content: center;
    margin-top: 10px;
    width: 100%;
}

.avg {
    margin-top: 15px;
    text-align: center;
}

.avg-number {
    font-size: 48px;
    font-weight: bold;
}

.small {
    opacity: 0.8;
}
</style>
