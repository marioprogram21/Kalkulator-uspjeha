<!DOCTYPE html>
<html lang="hr">
<head>
<meta charset="UTF-8">
<title>Kalkulator uspjeha</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#1a237e">
<link rel="manifest" href="manifest.json">

<style>
:root {
    --bg-color: #1a237e;        /* tamno plava pozadina */
    --text-color: #ffffff;      /* bijeli tekst */
    --accent-color: #6c5ce7;    /* ljubičasto-plavi gumbi */
    --hover-color: #5a4fcf;     /* tamniji hover za gumb */
}
body {
    background-color: var(--bg-color);
    color: var(--text-color);
    font-family: 'Segoe UI', sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    margin: 0;
    padding: 20px;
    transition: all 0.3s ease;
}
h1 {
    margin-bottom: 40px;
    text-align: center;
    color: var(--text-color);
}
.menu-box {
    display: flex;
    flex-direction: column;
    gap: 20px;
    align-items: center;
}
button {
    padding: 15px 30px;
    border: none;
    border-radius: 15px;
    cursor: pointer;
    background: var(--accent-color);
    color: #fff;
    font-weight: bold;
    font-size: 1.1em;
    width: 250px;
    transition: 0.2s;
    box-shadow: 0 5px 15px rgba(0,0,0,0.2);
}
button:hover {
    background: var(--hover-color);
    box-shadow: 0 7px 20px rgba(0,0,0,0.25);
}
#installBtn { display: none; }
footer {
    margin-top: 50px;
    opacity: 0.7;
    font-size: 0.9em;
    color: #fff;
}
</style>
</head>

<body>
<h1>Kalkulator uspjeha</h1>

<div class="menu-box">
    <button onclick="window.location.href='Kalkulator-ocjena.html'">📊 Kalkulator ocjena</button>
    <button onclick="window.location.href='kalkulator-opceg.html'">🎓 Kalkulator općeg uspjeha</button>
    <button id="installBtn">📲 Preuzmi app</button>
</div>

<footer>Napravio Mario</footer>

<script>
// PWA Instalacija
let deferredPrompt;
window.addEventListener('beforeinstallprompt', (e) => {
    e.preventDefault();
    deferredPrompt = e;
    const btn = document.getElementById('installBtn');
    btn.style.display = 'block';
    btn.addEventListener('click', () => {
        btn.style.display = 'none';
        deferredPrompt.prompt();
        deferredPrompt.userChoice.then(choiceResult => { deferredPrompt = null; });
    });
});
</script>

</body>
</html>
