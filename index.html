<!DOCTYPE html>
<html lang="hr">
<head>
<meta charset="UTF-8">
<title>Kalkulator uspjeha</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    background: #1a237e; /* ✔ ISTA BOJA */
    color: #ffffff;
    font-family: 'Segoe UI', sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    margin: 0;
}

h1 {
    font-size: 3em;
    text-align: center;
    background: linear-gradient(90deg, #ff9a9e, #667eea, #89f7fe);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

.menu-box {
    display: flex;
    flex-direction: column;
    gap: 15px;
}

button {
    padding: 16px 26px;
    width: 260px;
    border-radius: 12px;
    border: none;
    font-weight: bold;
    cursor: pointer;
    background: #6c5ce7;
    color: white;
    transition: 0.2s;
}

button:hover {
    background: #5a4fcf;
}

footer {
    margin-top: 40px;
    opacity: 0.7;
}
</style>
</head>

<body>

<h1>Kalkulator uspjeha</h1>

<div class="menu-box">
    <button onclick="location.href='Kalkulator-ocjena.html'">📊 Kalkulator ocjena</button>
    <button onclick="location.href='kalkulator-opceg.html'">🎓 Opći uspjeh</button>
</div>

<footer>Napravio Mario</footer>

</body>
</html>
