<!DOCTYPE html>
<html lang="hr">
<head>
<meta charset="UTF-8">
<title>Menu Kalkulatora</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#ff9900">
<link rel="manifest" href="manifest.json">

<style>
:root {
    --bg-color: #121212;
    --text-color: #ffffff;
    --accent-color: #ff9900;
    --hover-color: #ffa500;
}
body.light {
    --bg-color: #f5f5f5;
    --text-color: #121212;
    --accent-color: #007bff;
    --hover-color: #3399ff;
}
body {
    background: var(--bg-color);
    color: var(--text-color);
    font-family: 'Segoe UI', sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    margin: 0;
    padding: 20px;
    transition: all 0.3s ease;
}
h1 {
    margin-bottom: 30px;
    text-align:center;
    font-size: 2.2em;
    text-shadow: 1px 1px 4px rgba(0,0,0,0.3);
}
.menu-box {
    display: flex;
    flex-direction: column;
    gap: 15px;
    align-items: center;
}
button {
    padding: 15px 25px;
    border: none;
    border-radius: 14px;
    cursor: pointer;
    background: var(--accent-color);
    color: var(--text-color);
    font-weight: bold;
    font-size: 1.1em;
    width: 240px;
    box-shadow: 0 6px 15px rgba(0,0,0,0.3);
    transition: all 0.3s ease;
}
button:hover {
    background: var(--hover-color);
    transform: translateY(-2px);
    box-shadow: 0 10px 25px rgba(0,0,0,0.35);
}
#installBtn {
    display: none;
    background: #28a745;
}
#installBtn:hover {
    background: #45c261;
}
footer {
    margin-top: 50px;
    opacity: 0.7;
    font-size: 0.9em;
}
</style>
</head>
<body>

<h1>Kalkulatori</h1>

<div class="menu-box">
    <button onclick="window.location.href='Kalkulator-ocjena.html'">📊 Kalkulator ocjena</button>
    <button onclick="window.location.href='kalkulator-opceg.html'">🎓 Kalkulator općeg uspjeha</button>
    <button onclick="promijeniTemu()">💡 Promijeni temu</button>
    <button id="installBtn">📲 Preuzmi app</button>
</div>

<footer>Napravio Mario</footer>

<script>
// Tema
if(localStorage.getItem('tema')==='light') document.body.classList.add('light');
function promijeniTemu(){
    document.body.classList.toggle('light');
    localStorage.setItem('tema', document.body.classList.contains('light') ? 'light' : 'dark');
}

// PWA instalacija
let deferredPrompt;
window.addEventListener('beforeinstallprompt', (e) => {
    e.preventDefault();
    deferredPrompt = e;
    const btn = document.getElementById('installBtn');
    btn.style.display = 'block';
    btn.onclick = () => {
        btn.style.display = 'none';
        deferredPrompt.prompt();
        deferredPrompt.userChoice.then(() => { deferredPrompt = null; });
    };
});
</script>

</body>
</html>
