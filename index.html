<!DOCTYPE html>
<html lang="hr">
<head>
<meta charset="UTF-8">
<title>Kalkulator uspjeha</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#1a237e">
<link rel="manifest" href="manifest.json">

<style>
:root {
    --bg-color: #1a237e;        /* tamno plava glavna pozadina */
    --text-color: #ffffff;      /* bijeli tekst */
    --accent-color: #6c5ce7;    /* ljubičasto-plavi gumbi */
    --hover-color: #5a4fcf;     /* tamniji hover za gumb */
}

body.light {
    --bg-color: #f0e6ff;       /* svijetla tema pozadina */
    --text-color: #2c2c2c;     /* tamno sivi tekst */
    --accent-color: #6c5ce7;
    --hover-color: #5a4fcf;
}

body {
    background-color: var(--bg-color);
    color: var(--text-color);
    font-family: 'Segoe UI', sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    margin: 0;
    padding: 20px;
    transition: all 0.3s ease;
}

/* Uređen naslov sa gradientom i animacijom */
h1 {
    margin-bottom: 40px;
    text-align: center;
    font-size: 3em;
    font-weight: 900;
    background: linear-gradient(90deg, #ff9a9e, #fad0c4, #667eea);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    text-shadow: 0 4px 15px rgba(0,0,0,0.35);
    animation: popTitle 0.8s ease;
}

@keyframes popTitle {
    0% { transform: scale(0.8) translateY(-20px); opacity: 0; }
    50% { transform: scale(1.2) translateY(5px); opacity: 1; }
    100% { transform: scale(1) translateY(0); }
}

.menu-box {
    display: flex;
    flex-direction: column;
    gap: 20px;
    align-items: center;
}

button {
    padding: 15px 30px;
    border: none;
    border-radius: 15px;
    cursor: pointer;
    background: var(--accent-color);
    color: #fff;
    font-weight: bold;
    font-size: 1.1em;
    width: 250px;
    transition: 0.2s;
    box-shadow: 0 5px 15px rgba(0,0,0,0.2);
}
button:hover {
    background: var(--hover-color);
    box-shadow: 0 7px 20px rgba(0,0,0,0.25);
}

#installBtn { display: none; }

footer {
    margin-top: 50px;
    opacity: 0.7;
    font-size: 0.9em;
    color: var(--text-color);
}
</style>
</head>

<body>
<h1>Kalkulator uspjeha</h1>

<div class="menu-box">
    <button onclick="window.location.href='Kalkulator-ocjena.html'">📊 Kalkulator ocjena</button>
    <button onclick="window.location.href='kalkulator-opceg.html'">🎓 Kalkulator općeg uspjeha</button>
    <button onclick="toggleTheme()">💡 Promijeni temu</button>
    <button id="installBtn">📲 Preuzmi app</button>
</div>

<footer>Napravio Mario</footer>

<script>
// Tema: učitaj prethodno odabranu
if(localStorage.getItem('tema') === 'light') {
    document.body.classList.add('light');
}

// Funkcija za promjenu teme
function toggleTheme() {
    document.body.classList.toggle('light');
    const tema = document.body.classList.contains('light') ? 'light' : 'dark';
    localStorage.setItem('tema', tema);
}

// PWA Instalacija
let deferredPrompt;
window.addEventListener('beforeinstallprompt', (e) => {
    e.preventDefault();
    deferredPrompt = e;
    const btn = document.getElementById('installBtn');
    btn.style.display = 'block';
    btn.addEventListener('click', () => {
        btn.style.display = 'none';
        deferredPrompt.prompt();
        deferredPrompt.userChoice.then(() => { deferredPrompt = null; });
    });
});
</script>

</body>
</html>
