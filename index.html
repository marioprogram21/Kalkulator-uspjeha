<!DOCTYPE html>
<html lang="hr">
<head>
<meta charset="UTF-8">
<title>Kalkulator uspjeha</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#ff9900">
<link rel="manifest" href="manifest.json">

<style>
:root {
    --bg-color: #f5f5f5;
    --text-color: #121212;
    --accent-color: #ff9900;
}
body.dark {
    --bg-color: #121212;
    --text-color: #ffffff;
    --accent-color: #ff9900;
}
body {
    background: var(--bg-color);
    color: var(--text-color);
    font-family: 'Segoe UI', sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    margin: 0;
    padding: 20px;
    transition: all 0.3s ease;
}
h1 { 
    margin-bottom: 30px; 
    text-align:center;
    font-size: 2em;
}
.menu-box {
    display: flex;
    flex-direction: column;
    gap: 15px;
    align-items: center;
}
button {
    padding: 15px 25px;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    background: var(--accent-color);
    color: var(--text-color);
    font-weight: bold;
    font-size: 1.1em;
    width: 220px;
    transition: 0.2s;
}
button:hover { background: #ffa500; }
#installBtn { display: none; }
footer { margin-top: 50px; opacity: 0.7; font-size: 0.9em; }
</style>
</head>

<body>

<h1>Kalkulator uspjeha</h1>

<div class="menu-box">
    <button onclick="window.location.href='Kalkulator-ocjena.html'">📊 Kalkulator ocjena</button>
    <button onclick="window.location.href='kalkulator-opceg.html'">🎓 Kalkulator općeg uspjeha</button>
    <button onclick="promijeniTemu()">💡 Promijeni temu</button>
    <button id="installBtn">📲 Preuzmi app</button>
</div>

<footer>Napravio Mario</footer>

<script>
// Tema: default svijetla, dark se uključuje po kliku
if(localStorage.getItem('tema')==='dark') document.body.classList.add('dark');

function promijeniTemu(){
    document.body.classList.toggle('dark');
    localStorage.setItem('tema', document.body.classList.contains('dark') ? 'dark' : 'light');
}

// PWA instalacija
let deferredPrompt;
window.addEventListener('beforeinstallprompt', (e) => {
    e.preventDefault();
    deferredPrompt = e;
    const btn = document.getElementById('installBtn');
    btn.style.display = 'block';
    btn.addEventListener('click', () => {
        btn.style.display = 'none';
        deferredPrompt.prompt();
        deferredPrompt.userChoice.then(choiceResult => { deferredPrompt = null; });
    });
});
</script>

</body>
</html>
