<!DOCTYPE html>
<html lang="hr">
<head>
<meta charset="UTF-8">
<title>Kalkulator uspjeha</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#8e44ad">
<link rel="manifest" href="manifest.json">

<style>
:root {
    --bg-color: #a29bfe; /* svijetlo plavo-ljubičasta */
    --text-color: #2d3436;
    --accent-color: #6c5ce7; /* tamnija ljubičasta za gumb */
    --hover-color: #5a4fcf;
}
body {
    background: var(--bg-color);
    color: var(--text-color);
    font-family: 'Segoe UI', sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    margin: 0;
    padding: 20px;
    transition: all 0.3s ease;
}
h1 { 
    margin-bottom: 30px; 
    text-align:center;
    font-size: 2.2em;
    font-weight: bold;
    color: #fff;
    text-shadow: 2px 2px 5px rgba(0,0,0,0.3);
}
.menu-box {
    display: flex;
    flex-direction: column;
    gap: 20px;
    align-items: center;
    width: 100%;
    max-width: 360px;
}
button {
    padding: 18px 25px;
    border: none;
    border-radius: 20px;
    cursor: pointer;
    background: rgba(255,255,255,0.25);
    color: #fff;
    font-weight: bold;
    font-size: 1.1em;
    width: 100%;
    text-align: left;
    box-shadow: 0 8px 20px rgba(0,0,0,0.2);
    backdrop-filter: blur(8px);
    transition: all 0.3s ease;
}
button:hover { 
    background: rgba(255,255,255,0.4);
    transform: translateY(-2px);
}
#installBtn { display: none; }
footer { margin-top: 50px; opacity: 0.7; font-size: 0.9em; text-align: center; color:#fff; }
</style>
</head>

<body>

<h1>Kalkulator uspjeha</h1>

<div class="menu-box">
    <button onclick="window.location.href='Kalkulator-ocjena.html'">📊 Kalkulator ocjena</button>
    <button onclick="window.location.href='kalkulator-opceg.html'">🎓 Kalkulator općeg uspjeha</button>
    <button id="installBtn">📲 Preuzmi app</button>
</div>

<footer>Napravio Mario</footer>

<script>
// PWA instalacija
let deferredPrompt;
window.addEventListener('beforeinstallprompt', (e) => {
    e.preventDefault();
    deferredPrompt = e;
    const btn = document.getElementById('installBtn');
    btn.style.display = 'block';
    btn.addEventListener('click', () => {
        btn.style.display = 'none';
        deferredPrompt.prompt();
        deferredPrompt.userChoice.then(choiceResult => { deferredPrompt = null; });
    });
});
</script>

</body>
</html>
