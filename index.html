<!DOCTYPE html>
<html lang="hr">
<head>
<meta charset="UTF-8">
<title>Kalkulator uspjeha</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#ffb347">
<link rel="manifest" href="manifest.json">

<style>
:root {
    --bg-color: #ffeaa7; /* svijetla, vesela boja */
    --text-color: #2d3436;
    --accent-color: #fd79a8; /* ružičasta akcija boja za gumb */
    --hover-color: #fab1a0;
}
body {
    background: var(--bg-color);
    color: var(--text-color);
    font-family: 'Segoe UI', sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    margin: 0;
    padding: 20px;
    transition: all 0.3s ease;
}
h1 { 
    margin-bottom: 30px; 
    text-align:center;
    font-size: 2.2em;
    font-weight: bold;
    color: #d63031;
}
.menu-box {
    display: flex;
    flex-direction: column;
    gap: 20px;
    align-items: center;
}
button {
    padding: 15px 25px;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    background: var(--accent-color);
    color: #ffffff;
    font-weight: bold;
    font-size: 1.1em;
    width: 240px;
    transition: 0.3s;
    box-shadow: 0 5px 15px rgba(0,0,0,0.2);
}
button:hover { 
    background: var(--hover-color);
    transform: translateY(-2px);
}
#installBtn { display: none; }
footer { margin-top: 50px; opacity: 0.7; font-size: 0.9em; text-align: center; }
</style>
</head>

<body>

<h1>Kalkulator uspjeha</h1>

<div class="menu-box">
    <button onclick="window.location.href='Kalkulator-ocjena.html'">📊 Kalkulator ocjena</button>
    <button onclick="window.location.href='kalkulator-opceg.html'">🎓 Kalkulator općeg uspjeha</button>
    <button id="installBtn">📲 Preuzmi app</button>
</div>

<footer>Napravio Mario</footer>

<script>
// PWA instalacija
let deferredPrompt;
window.addEventListener('beforeinstallprompt', (e) => {
    e.preventDefault();
    deferredPrompt = e;
    const btn = document.getElementById('installBtn');
    btn.style.display = 'block';
    btn.addEventListener('click', () => {
        btn.style.display = 'none';
        deferredPrompt.prompt();
        deferredPrompt.userChoice.then(choiceResult => { deferredPrompt = null; });
    });
});
</script>

</body>
</html>
