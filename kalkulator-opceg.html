<!DOCTYPE html>
<html lang="hr">
<head>
<meta charset="UTF-8">
<title>Kalkulator općeg uspjeha</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
* { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; margin:0; padding:0; }

body {
    height: 100vh;
    background: linear-gradient(135deg, #667eea, #764ba2);
    display: flex;
    justify-content: center;
    align-items: center;
}

.app {
    width: 360px;
    padding: 30px;
    border-radius: 25px;
    background: #f0f0f0;
    box-shadow: 0 15px 35px rgba(0,0,0,0.2);
    color: #111;
}

h2 {
    text-align: center;
    font-size: 3em;
    font-weight: 900;
    margin-bottom: 30px;
    background: linear-gradient(90deg, #ff9a9e, #fad0c4, #667eea, #89f7fe);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

select, input {
    width: 100%;
    padding: 12px;
    margin: 8px 0;
    border: none;
    border-radius: 12px;
}

button {
    padding: 10px;
    margin: 5px 0;
    border: none;
    border-radius: 12px;
    font-weight: bold;
    background: #333;
    color: white;
    cursor: pointer;
}

.card {
    display: flex;
    justify-content: space-between;
    padding: 10px;
    margin-top: 6px;
    border-radius: 14px;
    background: #e0e0e0;
}
</style>
</head>

<body>

<div class="app">

<h2>Kalkulator općeg uspjeha</h2>

<select id="subject">
    <option>Matematika</option>
    <option>Hrvatski jezik</option>
    <option>Engleski jezik</option>
</select>

<input type="number" id="grade">

<button onclick="add()">Dodaj</button>
<button onclick="removeAll()">Obriši sve</button>
<button onclick="window.location.href='index.html'">🏠 Menu</button>

<div id="cards"></div>

</div>

<script>
let grades = [];

function add(){
    let s=document.getElementById("subject").value;
    let g=Number(document.getElementById("grade").value);

    if(!g) return;

    grades.push({s,g});
    render();
}

function render(){
    let c=document.getElementById("cards");
    c.innerHTML="";

    grades.forEach(g=>{
        let div=document.createElement("div");
        div.className="card";
        div.innerHTML=`<span>${g.s}</span><span>${g.g}</span>`;
        c.appendChild(div);
    });
}

function removeAll(){
    grades=[];
    render();
}
</script>

</body>
</html>
