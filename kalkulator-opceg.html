<!DOCTYPE html>
<html lang="hr">
<head>
<meta charset="UTF-8">
<title>Kalkulator općeg uspjeha</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#ff9900">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon.png">

<style>
:root {
  --bg-color: #121212;
  --text-color: #fff;
  --box-color: #1f1f1f;
  --accent-color: #ff9900;
}
body.light {
  --bg-color: #f5f5f5;
  --text-color: #121212;
  --box-color: #ffffff;
  --accent-color: #007bff;
}
body {
  background: var(--bg-color);
  color: var(--text-color);
  font-family: 'Arial', sans-serif;
  display: flex;
  flex-direction: column;
  align-items: center;
  min-height: 100vh;
  margin: 0;
  padding: 20px;
  transition: all 0.3s ease;
}
h1 { margin-bottom: 20px; text-align:center; }
.box {
  background: var(--box-color);
  padding: 25px;
  border-radius: 20px;
  width: 360px;
  box-shadow: 0 0 25px rgba(0,0,0,0.4);
  display: flex;
  flex-direction: column;
  align-items: center;
}
select, input[type=number] {
  width: 100%;
  padding: 12px;
  margin: 8px 0;
  border-radius: 12px;
  border: none;
  font-size: 1em;
}
.cards { margin-top: 15px; width:100%; }
.card {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 10px 12px;
  margin-top: 6px;
  border-radius: 14px;
  font-weight: bold;
  background: rgba(255,255,255,0.6);
  color:black;
  transition: transform 0.2s;
}
.card:hover { transform: translateY(-2px); }
.card span { width: 70%; }
.grade { text-align:right; width:20%; }
.delete {
  background: rgba(0,0,0,0.1);
  border:none;
  color:black;
  border-radius:8px;
  cursor:pointer;
  padding:2px 6px;
  font-size:0.8em;
  transition:0.2s;
}
.delete:hover { background: rgba(0,0,0,0.2); }

.btn-group { display:flex; flex-wrap:wrap; justify-content:center; gap:10px; margin-top:15px; width:100%; }
button { padding:10px 15px; border:none; border-radius:8px; cursor:pointer; background:var(--accent-color); color:var(--text-color); font-weight:bold; min-width:100px; transition:0.2s; }
button:hover { opacity:0.85; }

.avg { text-align:center; margin-top:20px; }
.avg-number { font-size:48px; font-weight:bold; letter-spacing:1px; }
footer { margin-top:auto; opacity:0.7; text-align:center; }
</style>
</head>
<body>

<h1>Kalkulator općeg uspjeha</h1>

<div class="box">
  <select id="subject">
    <option value="" disabled selected>Odaberi predmet</option>
    <option>Matematika</option>
    <option>Hrvatski jezik</option>
    <option>Engleski jezik</option>
    <option>Priroda</option>
    <option>Povijest</option>
    <option>Geografija</option>
    <option>Likovna kultura</option>
    <option>Glazbena kultura</option>
    <option>Tjelesna i zdravstvena kultura</option>
    <option>Tehnička kultura</option>
    <option>Informatika</option>
  </select>

  <input type="number" id="grade" placeholder="Ocjena (1-5)" onkeypress="handleEnter(event)">

  <div class="btn-group">
    <button onclick="add()">Dodaj ocjenu</button>
    <button onclick="removeAll()">Obriši sve</button>
    <button onclick="promijeniTemu()">💡 Tema</button>
    <button onclick="window.location.href='index.html'">🏠 Menu</button>
    <button id="installBtn" style="display:none;">📲 Instaliraj app</button>
  </div>

  <div class="cards" id="cards"></div>

  <div class="avg">
    <div class="avg-number" id="avg">0.00</div>
    <div class="small">Prosjek</div>
  </div>
</div>

<footer>Napravio Mario</footer>

<script>
let grades = JSON.parse(localStorage.getItem("grades")) || [];

// Tema
function promijeniTemu(){
    document.body.classList.toggle('light');
    localStorage.setItem('tema', document.body.classList.contains('light') ? 'light' : 'dark');
}
if(localStorage.getItem('tema')==='light') document.body.classList.add('light');

// Enter
function handleEnter(e){ if(e.key==='Enter') add(); }

// Dodaj ocjenu
function add(){
    const subject = document.getElementById("subject").value;
    const grade = parseInt(document.getElementById("grade").value);
    if(!subject || grade<1 || grade>5) return;
    grades.push({subject, grade});
    save(); render();
    document.getElementById("subject").selectedIndex=0;
    document.getElementById("grade").value="";
}

// Obriši jedan
function remove(i){ grades.splice(i,1); save(); render(); }
// Obriši sve
function removeAll(){ grades=[]; save(); render(); }
// Spremi u storage
function save(){ localStorage.setItem("grades", JSON.stringify(grades)); }

// Render
function render(){
    const container = document.getElementById("cards");
    container.innerHTML="";
    grades.forEach((g,i)=>{
        const card = document.createElement("div");
        card.className="card";
        card.innerHTML=`<span>${g.subject}</span><span class="grade">${g.grade}</span>`;
        const btn = document.createElement("button");
        btn.className="delete"; btn.textContent="x"; btn.onclick=()=>remove(i);
        card.appendChild(btn); container.appendChild(card);
    });
    calc();
}

// Izračun
function calc(){
    if(grades.length===0){ document.getElementById("avg").textContent="0.00"; return; }
    let sum=grades.reduce((a,b)=>a+b.grade,0);
    let avg=(sum/grades.length).toFixed(2);
    const avgElem = document.getElementById("avg");
    avgElem.textContent=avg;
    if(avg>=4.5) avgElem.style.color="green";
    else if(avg>=3.5) avgElem.style.color="orange";
    else avgElem.style.color="red";
}

render();

// PWA Instalacija
let deferredPrompt;
window.addEventListener('beforeinstallprompt', (e)=>{
    e.preventDefault();
    deferredPrompt=e;
    const btn = document.getElementById('installBtn');
    btn.style.display='block';
    btn.addEventListener('click', ()=>{
        btn.style.display='none';
        deferredPrompt.prompt();
        deferredPrompt.userChoice.then(choiceResult=>{ deferredPrompt=null; });
    });
});
</script>

</body>
</html>
