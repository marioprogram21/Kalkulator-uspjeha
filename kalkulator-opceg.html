<!DOCTYPE html>
<html lang="hr">
<head>
<meta charset="UTF-8">
<title>Opći uspjeh</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
:root {
    --bg-color: #1a237e;
    --text-color: #ffffff;
    --accent-color: #6c5ce7;
    --hover-color: #5a4fcf;
}

body {
    background: var(--bg-color);
    color: var(--text-color);
    font-family: 'Segoe UI', sans-serif;
    display: flex;
    justify-content: center;
    padding: 20px;
}

.app {
    width: 380px;
    padding: 25px;
    border-radius: 20px;
    background: rgba(255,255,255,0.08);
}

select, input {
    width: 100%;
    padding: 10px;
    margin: 6px 0;
    border-radius: 10px;
    border: none;
}

button {
    width: 100%;
    padding: 12px;
    margin-top: 8px;
    border-radius: 10px;
    border: none;
    background: var(--accent-color);
    color: white;
    cursor: pointer;
}

button:hover {
    background: var(--hover-color);
}

.card {
    display: flex;
    justify-content: space-between;
    padding: 8px;
    margin-top: 6px;
    background: rgba(255,255,255,0.1);
    border-radius: 10px;
}

.avg {
    text-align: center;
    font-size: 40px;
    margin-top: 15px;
}
</style>
</head>

<body>

<div class="app">

<h2 style="text-align:center;">Opći uspjeh</h2>

<select id="subject">
    <option>Matematika</option>
    <option>Hrvatski</option>
    <option>Engleski</option>
</select>

<input id="grade" type="number" min="1" max="5">

<button onclick="add()">Dodaj</button>
<button onclick="calc()">Izračunaj</button>
<button onclick="location.href='index.html'">Menu</button>

<div id="cards"></div>

<div class="avg" id="avg">0.00</div>

</div>

<script>
let data=[];

function add(){
    let s=document.getElementById("subject").value;
    let g=Number(document.getElementById("grade").value);

    if(!g) return;

    data.push({s,g});
    render();
}

function render(){
    let c=document.getElementById("cards");
    c.innerHTML="";

    data.forEach((d,i)=>{
        let div=document.createElement("div");
        div.className="card";
        div.innerHTML=`<span>${d.s}</span><span>${d.g}</span>`;
        c.appendChild(div);
    });
}

function calc(){
    let sum=0;
    data.forEach(d=>sum+=d.g);

    document.getElementById("avg").textContent =
        data.length ? (sum/data.length).toFixed(2) : "0.00";
}
</script>

</body>
</html>
