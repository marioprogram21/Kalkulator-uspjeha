<!DOCTYPE html>
<html lang="hr">
<head>
<meta charset="UTF-8">
<title>Kalkulator općeg uspjeha</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
* { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; margin:0; padding:0; }

body {
    height: 100vh;
    background: linear-gradient(135deg, #667eea, #764ba2);
    display: flex;
    justify-content: center;
    align-items: center;
}

.app {
    width: 360px;
    padding: 30px;
    border-radius: 25px;
    background: #f0f0f0;
    box-shadow: 0 15px 35px rgba(0,0,0,0.2);
    animation: fadeIn 0.6s ease;
    color: #111;
}

h2 {
    text-align: center;
    font-size: 2.2em;
    font-weight: bold;
    margin-bottom: 20px;
    background: linear-gradient(90deg, #ff9a9e, #fad0c4, #667eea);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    text-shadow: 0 2px 8px rgba(0,0,0,0.25);
}

select, input[type=number] {
    width: 100%;
    padding: 12px;
    margin: 8px 0;
    border: none;
    border-radius: 12px;
    outline: none;
    font-size: 1em;
    background: white;
    color: #111; 
}

button {
    padding: 10px;
    margin: 5px 0;
    border: none;
    border-radius: 12px;
    font-size: 1em;
    font-weight: bold;
    background: #333;
    color: white;
    cursor: pointer;
    transition: 0.2s;
}

button:hover { background: #555; }

.cards { margin-top: 15px; }

.card {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 12px;
    border-radius: 14px;
    margin-top: 6px;
    font-weight: bold;
    box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    transition: transform 0.2s, box-shadow 0.2s;
    background: #e0e0e0;
    color: #111;
}

.card:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0,0,0,0.2); }

.card span { font-size: 1em; width: 70%; }

.grade { text-align: right; width: 20%; }

.delete {
    background: rgba(0,0,0,0.1);
    border: none;
    color: #111;
    border-radius: 8px;
    cursor: pointer;
    padding: 2px 6px;
    font-weight: bold;
    transition: background 0.2s;
    font-size: 0.8em;
}

.delete:hover { background: rgba(0,0,0,0.2); }

.avg { text-align: center; margin-top: 20px; }
.avg-number { 
    font-size: 48px; 
    font-weight: bold; 
    letter-spacing: 1px; 
    color:#111; 
    transition: all 0.5s ease;
}
.small { opacity: 0.8; font-size: 0.9em; color:#111; }

.btn-group {
    display: flex;
    justify-content: space-between;
    gap: 10px;
    margin-top: 10px;
}

@keyframes fadeIn { from {opacity:0; transform: translateY(25px);} to {opacity:1; transform: translateY(0);} }
@keyframes avgPop {
    0% { opacity:0; transform: scale(0.8) translateY(-10px); }
    50% { transform: scale(1.3) translateY(-5px); opacity:1; }
    70% { transform: scale(0.9) translateY(3px); }
    100% { transform: scale(1) translateY(0); }
}
</style>
</head>

<body>

<div class="app">
    <h2>Kalkulator općeg uspjeha</h2>

    <select id="subject">
        <option value="" disabled selected>Odaberi predmet</option>
        <option>Matematika</option>
        <option>Hrvatski jezik</option>
        <option>Engleski jezik</option>
        <option>Biologija (Priroda)</option>
        <option>Povijest</option>
        <option>Geografija</option>
        <option>Likovna kultura</option>
        <option>Glazbena kultura</option>
        <option>Tjelesna i zdravstvena kultura</option>
        <option>Tehnička kultura</option>
        <option>Informatika</option>
        <option>Njemački jezik (Deutsch)</option>
        <option>Francuski jezik (Français)</option>
        <option>Fizika</option>
        <option>Kemija</option>
        <option>Vjeronauk</option>
    </select>

    <input type="number" id="grade" placeholder="Ocjena (1-5)" onkeypress="handleEnter(event)">

    <div class="btn-group">
        <button onclick="add()">Dodaj ocjenu</button>
        <button onclick="removeAll()">Obriši sve</button>
        <button onclick="window.location.href='index.html'">🏠 Menu</button>
    </div>

    <div class="cards" id="cards"></div>

    <div class="avg">
        <div class="avg-number" id="avg">0.00</div>
        <div class="small">Prosjek</div>
    </div>
</div>

<script>
let grades = JSON.parse(localStorage.getItem("grades") || "[]");
grades = grades.map(g => { if(g.subject === "Priroda") g.subject = "Biologija (Priroda)"; return g; });
grades = grades.filter(g => g.subject && !isNaN(g.grade));

function save() { localStorage.setItem("grades", JSON.stringify(grades)); }
function handleEnter(e) { if (e.key === "Enter") add(); }

function add() {
    const subject = document.getElementById("subject").value;
    const grade = parseInt(document.getElementById("grade").value);
    if (!subject || grade < 1 || grade > 5) return;
    grades.push({ subject, grade });
    save();
    render();
    document.getElementById("subject").selectedIndex = 0;
    document.getElementById("grade").value = "";
}

function remove(i) { grades.splice(i, 1); save(); render(); }
function removeAll() { grades = []; save(); render(); }

function render() {
    const container = document.getElementById("cards");
    container.innerHTML = "";
    grades = grades.filter(g => g.subject && !isNaN(g.grade));
    grades.forEach((g, i) => {
        const card = document.createElement("div");
        card.className = `card g${g.grade}`;
        card.innerHTML = `<span>${g.subject}</span><span class="grade">${g.grade}</span>`;
        const btn = document.createElement("button");
        btn.className = "delete";
        btn.textContent = "x";
        btn.onclick = () => remove(i);
        card.appendChild(btn);
        container.appendChild(card);
    });
    calc();
}

function calc() {
    const avgElem = document.getElementById("avg");
    if (grades.length === 0) { avgElem.textContent = "0.00"; avgElem.style.color = "#111"; return; }
    let sum = grades.reduce((a,b)=>a+b.grade,0);
    let avg = (sum / grades.length).toFixed(2);
    avgElem.textContent = avg;
    // Animacija pop
    avgElem.style.animation = "avgPop 0.8s";
    if(avg>=4.5) avgElem.style.color = "green";
    else if(avg>=3.5) avgElem.style.color = "orange";
    else avgElem.style.color = "red";
}

render();
</script>

</body>
</html>
